openapi: 3.1.0
info:
  title: orchestrator-service
  version: 0.1.0
  description: >
    W0 orchestrator service that drives COBOL-to-Java workflow execution as a
    Harness consumer. The orchestrator is the only product workflow executor
    for UI-started transformation runs and never bypasses the Harness
    capability gateway. The workflow lifecycle emits Harness events
    `orchestrator.workflow.accepted`, `orchestrator.workflow.completed`, and
    `orchestrator.workflow.failed`. Run state transitions to `failed` when a
    required capability is unavailable or a step (parser, IR, generator,
    build/test, evidence) returns a non-success outcome, surfacing a
    diagnostic message in the Harness run state.
servers:
  - url: http://localhost:8084
    description: local
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v0/runs:
    post:
      summary: Start a W0 migration run
      operationId: startRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunStartRequest"
      responses:
        "201":
          description: Run accepted for orchestration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunStartResponse"
    get:
      summary: List harness runs
      operationId: listRuns
      responses:
        "200":
          description: Runs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunState"
  /v0/runs/{runId}:
    get:
      summary: Get orchestration run status
      operationId: getRunStatus
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current run state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunState"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v0/runs/{runId}/artifacts:
    get:
      summary: List persisted artifacts for a run
      description: >
        Returns the run-scoped artifacts index (`artifacts-index.json`)
        recorded under the configured `C2C_RUN_ARTIFACT_ROOT`. Every entry
        carries `uri`, `sha256`, `byteSize`, `mimeType`, `kind`, `createdBy`,
        `createdAt`, `runId`, and `workflowId`. The hash is computed from the
        exact bytes persisted on disk.
      operationId: listRunArtifacts
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Artifact index
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtifactsResponse" }
        "404":
          description: Run not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/generated:
    get:
      summary: Retrieve generated Java for a run
      description: >
        Returns the persisted Java project files together with the
        generation-response metadata, an `artifactRef` pointing at the
        generated-project manifest (Issue #97), traceability fields
        (programId, irId, sourceHash), and per-file refs. Files are read
        from disk and equal the exact bytes recorded in `generated-project/`.
      operationId: getRunGenerated
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Generated artifact envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedResponse" }
        "404":
          description: Run not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/generated/files:
    get:
      summary: List generated Java project files for a run
      description: >
        Returns the persisted file index (per-file path, sha256, byteSize,
        mimeType) plus the manifest `artifactRef`. The manifest sha256 is
        identical to the one returned by `/generated` and by the build-test
        and evidence envelopes — that equality is the Issue #97 consistency
        contract.
      operationId: getRunGeneratedFiles
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Generated file index
        "404":
          description: Run not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/generated/files/{filePath}:
    get:
      summary: Return a single generated Java project file by relative path
      description: >
        `filePath` is the relative path inside the persisted
        `generated-project/` directory. Path-traversal attempts (`..`,
        absolute paths, NUL bytes) return `400`. Files that do not exist in
        the persisted tree return `404`. The returned payload includes the
        file content as UTF-8 text plus sha256/byteSize/mimeType so callers
        can verify the bytes against the manifest.
      operationId: getRunGeneratedFile
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
        - in: path
          name: filePath
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Generated file content
        "400":
          description: Invalid generated file path
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Generated file not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/build-test:
    get:
      summary: Retrieve persisted build/test result for a run
      operationId: getRunBuildTest
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Build/test artifact envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtifactEnvelope" }
        "404":
          description: Run not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/evidence:
    get:
      summary: Retrieve persisted Evidence Pack manifest for a run
      operationId: getRunEvidence
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Evidence-pack manifest envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtifactEnvelope" }
        "404":
          description: Run not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/events:
    get:
      summary: Retrieve persisted trajectory ledger for a run
      operationId: getRunEvents
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Trajectory-ledger envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventsResponse" }
        "404":
          description: Run not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/workflow:
    get:
      summary: Retrieve the W0.2 workflow contract for a run (Issue #166)
      description: >
        Returns the Orchestrator-owned W0.2 run contract: current state,
        state history, active step, agent attempt count, repair/assist/model
        invocation budgets, assist decision, generated-java/build-test/
        evidence-pack references, final classification, and (when not
        successful) the canonical failure code and human-readable message.
        The contract is the source of truth that the BFF, UI, agent, and
        evidence-service consumers use to render and audit the workflow.
      operationId: getRunWorkflowContract
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Workflow-contract envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkflowContractResponse" }
        "404":
          description: Run not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/intentional-divergence/decision/request:
    post:
      summary: Document an intentional divergence decision for a parity mismatch
      description: >
        Records a governed reviewer approval for a run whose deterministic
        parity comparison failed. The decision is run-scoped, persisted as a
        decision artifact, and projected into the run contract and run summary
        only when it still matches the current comparison result for that run.
      operationId: documentIntentionalDivergence
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntentionalDivergenceDecisionRequest" }
      responses:
        "200":
          description: Intentional divergence decision envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntentionalDivergenceDecisionResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Run not found or parity mismatch validation failed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/manual-compile-repair/preview/request:
    post:
      summary: Create a repair preview for a manual Java candidate
      description: >
        Accepts the developer's edited Java files, validates them against the
        persisted generated-project baseline, and produces a redacted preview
        envelope containing the failure category, diagnostic excerpt, and
        evidence refs. The `previewId` in the response is required by the
        subsequent `diagnose/request` call.
      operationId: manualCompileRepairPreview
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualRepairPreviewRequest" }
      responses:
        "200":
          description: Repair preview envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualRepairPreviewResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Run not found or preview contract violation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/manual-compile-repair/diagnose/request:
    post:
      summary: Diagnose a manual Java repair candidate
      description: >
        Runs the repair agent against the preview identified by `previewId` and
        returns a diagnosis envelope that may include a repair proposal. The
        preview must have been created by a prior `preview/request` call for the
        same run.
      operationId: manualCompileRepairDiagnose
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualRepairDiagnoseRequest" }
      responses:
        "200":
          description: Manual diagnosis envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualRepairDiagnoseResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Run not found or diagnosis contract violation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/manual-compile-repair/apply/request:
    post:
      summary: Apply an approved manual repair proposal
      operationId: manualCompileRepairApply
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualRepairApplyRequest" }
      responses:
        "200":
          description: Applied manual repair envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualRepairApplyResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Run not found or approval contract violation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/manual-compile-repair/accept/request:
    post:
      summary: Accept an approved sandbox-applied repair proposal
      description: >
        Promotes a sandbox-applied proposal to the `approved` / `applied` state
        after the developer has reviewed the sandbox build/test result.
        Verifies the `patchSha256` against the persisted proposal before
        writing the approval artifact.
      operationId: manualCompileRepairAccept
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualRepairAcceptRequest" }
      responses:
        "200":
          description: Accepted repair envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualRepairAcceptResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Run not found or acceptance contract violation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /v0/runs/{runId}/manual-compile-repair/reject/request:
    post:
      summary: Reject a manual repair proposal
      operationId: manualCompileRepairReject
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualRepairRejectRequest" }
      responses:
        "200":
          description: Rejected manual repair envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualRepairRejectResponse" }
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Run not found or rejection contract violation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: orchestrator-service
        workflowId:
          type: string
          example: w0-migration-v0
    RunState:
      type: object
      required: [runId, workflowId, status]
      properties:
        runId:
          type: string
        workflowId:
          type: string
        status:
          type: string
          description: >
            Lifecycle status managed by orchestrator-service and persisted in
            the Harness run record. `failed` is set when a required capability
            cannot be resolved or any workflow step (parser, IR, generator,
            build/test, evidence) fails; the `message` field carries the
            diagnostic.
          enum: [starting, updating, completed, failed]
        evidenceRefs:
          type: array
          items:
            type: string
        policyDecision:
          type: string
        message:
          type: string
          description: >
            Human-readable status/diagnostic. For failed runs, includes the
            failing step or missing capability id.
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        lastUpdatedAt:
          type: string
          format: date-time
    RunStartRequest:
      type: object
      required: [inputRef]
      properties:
        requester:
          type: string
          description: Human/agent id that initiated the run
          example: orchestrator
        inputRef:
          $ref: "#/components/schemas/DataReferenceLike"
        modelPrompt:
          type: string
          description: Optional model assistance prompt routed through model-gateway capability
        executionMode:
          type: string
          enum: [standard, parity]
          description: >
            Optional additive run mode. `standard` preserves the existing
            transformation flow. `parity` enables orchestrator-owned
            source/reference execution plus parity-phase progress and evidence.
        trustCaseId:
          type: string
          description: Optional curated trust-case identifier for parity runs.
        sourceReferenceFixtureId:
          type: string
          description: >
            Approved acceptance-fixture identifier used for the source/reference
            side of a parity run.
        sourceReferenceMode:
          type: string
          enum: [reference-fixture, native-cobol]
          description: Controlled source/reference execution mode for parity runs.
        useTransformationAgent:
          type: boolean
          description: Optional opt-in for the productive transformation agent.
        generateOnly:
          type: boolean
          description: >
            Optional generator-only mode. When true, the orchestrator stops
            after Java generation and does not run deterministic verification.
        manualOverlay:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
        evidenceRefs:
          type: array
          items:
            type: string
      additionalProperties: false
    RunStartResponse:
      type: object
      required: [run, status, message]
      properties:
        run:
          $ref: "#/components/schemas/RunState"
        status:
          type: string
          example: started
        message:
          type: string
          example: orchestrator run started
    ManualRepairPreviewRequest:
      type: object
      required: [javaFiles]
      additionalProperties: false
      properties:
        requester:
          type: string
        entryFilePath:
          type: string
        entryClass:
          type: string
        javaFiles:
          type: array
          minItems: 1
          items:
            type: object
            required: [path, content]
            properties:
              path:
                type: string
              content:
                type: string
        manualOverlay:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true
    ManualRepairPreviewResponse:
      type: object
      required: [schemaVersion, previewId, runId]
      additionalProperties: true
      properties:
        schemaVersion:
          type: string
        previewId:
          type: string
        runId:
          type: string
        workflowId:
          type: string
        failureCategory:
          type: string
        includedFiles:
          type: array
          items:
            type: object
            additionalProperties: true
        diagnostics:
          type: array
          items:
            type: object
            additionalProperties: true
        constraints:
          type: object
          additionalProperties: true
        entryClass:
          type: string
        entryFilePath:
          type: string
        createdAt:
          type: string
          format: date-time
    ManualRepairDiagnoseRequest:
      type: object
      required: [previewId]
      additionalProperties: false
      properties:
        previewId:
          type: string
        requester:
          type: string
    ManualRepairDiagnoseResponse:
      type: object
      required: [schemaVersion, runId, diagnosis, candidateProject, buildTest]
      additionalProperties: true
      properties:
        schemaVersion:
          type: string
        runId:
          type: string
        diagnosis:
          type: object
          additionalProperties: true
        proposal:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        candidateProject:
          type: object
          additionalProperties: true
        buildTest:
          type: object
          additionalProperties: true
    ManualRepairApplyRequest:
      type: object
      required: [previewId, proposalId, patchSha256]
      additionalProperties: false
      properties:
        previewId:
          type: string
        proposalId:
          type: string
        patchSha256:
          type: string
        requester:
          type: string
    ManualRepairApplyResponse:
      type: object
      required: [schemaVersion, runId, proposal, candidateProject, buildTest]
      additionalProperties: true
      properties:
        schemaVersion:
          type: string
        runId:
          type: string
        proposal:
          type: object
          additionalProperties: true
        candidateProject:
          type: object
          additionalProperties: true
        buildTest:
          type: object
          additionalProperties: true
    ManualRepairAcceptRequest:
      type: object
      required: [proposalId, patchSha256]
      additionalProperties: false
      properties:
        proposalId:
          type: string
        patchSha256:
          type: string
        requester:
          type: string
    ManualRepairAcceptResponse:
      type: object
      required: [schemaVersion, runId, proposal, candidateProject, buildTest]
      additionalProperties: true
      properties:
        schemaVersion:
          type: string
        runId:
          type: string
        proposal:
          type: object
          additionalProperties: true
        candidateProject:
          type: object
          additionalProperties: true
        buildTest:
          type: object
          additionalProperties: true
    ManualRepairRejectRequest:
      type: object
      required: [proposalId]
      additionalProperties: false
      properties:
        proposalId:
          type: string
        requester:
          type: string
    ManualRepairRejectResponse:
      type: object
      required: [schemaVersion, runId, proposal]
      additionalProperties: true
      properties:
        schemaVersion:
          type: string
        runId:
          type: string
        proposal:
          type: object
          additionalProperties: true
    DataReferenceLike:
      type: object
      required: [uri]
      properties:
        uri:
          type: string
          description: Stable locator for an input artifact
          example: urn:examples/cobol/main.cbl
        sha256:
          type: string
          example: d2d2d2...
        byteSize:
          type: integer
          example: 1024
        byte_size:
          type: integer
          example: 1024
    ArtifactMetadata:
      type: object
      required: [uri, sha256, byteSize, mimeType, kind, createdBy, createdAt, runId, workflowId, path, name]
      properties:
        uri: { type: string, description: "file:// URI of the persisted artifact" }
        sha256: { type: string, description: SHA-256 over the exact bytes persisted }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        kind: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        runId: { type: string }
        workflowId: { type: string }
        path: { type: string, description: Path relative to the run artifact directory }
        name: { type: string }
    ArtifactsResponse:
      type: object
      required: [runId, workflowId, artifacts]
      properties:
        runId: { type: string }
        workflowId: { type: string }
        programId: { type: string }
        runStatus: { type: string, enum: [starting, updating, completed, failed, incomplete] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        artifacts:
          type: array
          items: { $ref: "#/components/schemas/ArtifactMetadata" }
        summary:
          type: object
          additionalProperties: true
    ArtifactEnvelope:
      type: object
      required: [runId, workflowId, status, missingArtifacts]
      properties:
        runId: { type: string }
        workflowId: { type: string }
        programId: { type: string }
        runStatus: { type: string }
        status: { type: string, enum: [complete, incomplete] }
        missingArtifacts:
          type: array
          items: { type: string }
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        artifactRef:
          oneOf:
            - $ref: "#/components/schemas/ArtifactMetadata"
            - type: 'null'
        kind: { type: string }
    GeneratedResponse:
      type: object
      required: [runId, workflowId, status, missingArtifacts, files]
      properties:
        runId: { type: string }
        workflowId: { type: string }
        programId: { type: string }
        runStatus: { type: string }
        status: { type: string, enum: [complete, incomplete] }
        missingArtifacts:
          type: array
          items: { type: string }
        entryClass: { type: string }
        entryFilePath: { type: string }
        fileCount: { type: integer, minimum: 0 }
        files:
          type: object
          additionalProperties: { type: string }
        unsupportedFeatures:
          type: array
          items: { type: string }
        openAssumptions:
          type: array
          items: { type: string }
        generationResponse:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        generationResponseRef:
          oneOf:
            - $ref: "#/components/schemas/ArtifactMetadata"
            - type: 'null'
        fileRefs:
          type: array
          items: { $ref: "#/components/schemas/ArtifactMetadata" }
    EventsResponse:
      type: object
      required: [runId, workflowId, status, events]
      properties:
        runId: { type: string }
        workflowId: { type: string }
        programId: { type: string }
        runStatus: { type: string }
        status: { type: string, enum: [complete, incomplete] }
        missingArtifacts:
          type: array
          items: { type: string }
        events:
          type: array
          items:
            type: object
            additionalProperties: true
        trajectoryRef:
          oneOf:
            - $ref: "#/components/schemas/ArtifactMetadata"
            - type: 'null'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    WorkflowContractResponse:
      type: object
      required: [runId, workflowId, status]
      description: Issue #166 — envelope for `GET /v0/runs/{runId}/workflow`.
      properties:
        runId: { type: string }
        workflowId: { type: string }
        programId: { type: string }
        runStatus: { type: string }
        status: { type: string, enum: [complete, incomplete] }
        missingArtifacts:
          type: array
          items: { type: string }
        source:
          type: string
          enum: [live, cached, unavailable]
          description: >
            `live` — payload comes from the in-memory contract held by the
            runner. `cached` — payload comes from the persisted
            `w02-run-contract.json` artifact. `unavailable` — no contract was
            recorded for the run.
        contract:
          oneOf:
            - $ref: "#/components/schemas/W02RunContract"
            - type: 'null'
        contractRef:
          oneOf:
            - $ref: "#/components/schemas/ArtifactMetadata"
            - type: 'null'
    W02RunContract:
      type: object
      required:
        - schemaVersion
        - runId
        - workflowId
        - sourceRef
        - currentState
        - stateHistory
        - agentAttemptCount
        - repairBudget
        - repairAttempts
      description: >
        W0.2 workflow contract (Issue #166). The Orchestrator owns this
        document; the Harness records the state-change events but does not
        decide transitions. W0.3 extends the same shape with explicit assist
        decisions and visible budgets.
      properties:
        schemaVersion: { type: string, enum: [v0] }
        runId: { type: string }
        workflowId: { type: string }
        requester: { type: string }
        sourceRef:
          type: object
          additionalProperties: true
        currentState:
          type: string
          enum:
            - run_accepted
            - source_normalized
            - cobol_parse_attempted
            - semantic_ir_ready
            - semantic_ir_blocked
            - baseline_generation_attempted
            - transformation_agent_invoked
            - java_candidate_persisted
            - build_test_running
            - verification_repair_invoked
            - final_java_selected
            - run_blocked
            - evidence_materialized
            - evidence_incomplete
            - final_classification
        stateHistory:
          type: array
          items: { $ref: "#/components/schemas/W02StateTransition" }
        activeStep:
          oneOf:
            - type: string
            - type: 'null'
        agentAttemptCount:
          type: integer
          minimum: 0
        repairBudget:
          $ref: "#/components/schemas/W02RepairBudget"
        assistBudget:
          $ref: "#/components/schemas/W03AssistBudget"
        modelInvocationBudget:
          $ref: "#/components/schemas/W03ModelInvocationBudget"
        generatedJavaRef:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        buildTestResultRef:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        parityComparison:
          oneOf:
            - $ref: "#/components/schemas/W04ParityComparisonProjection"
            - type: 'null'
        evidencePackRef:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        trustSummary:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        finalClassification:
          oneOf:
            - type: string
              enum: [success, blocked, failed, cancelled, incomplete]
            - type: 'null'
        failureCode:
          oneOf:
            - type: string
              enum:
                - unsupported_cobol
                - parse_failed
                - semantic_ir_failed
                - model_gateway_unavailable
                - model_policy_denied
                - agent_timeout
                - agent_contract_invalid
                - java_generation_failed
                - source_reference_failed
                - java_compile_failed
                - java_runtime_failed
                - oracle_mismatch
                - evidence_incomplete
                - cancelled
                - generate_only_complete
            - type: 'null'
        repairAttempts:
          type: array
          items: { $ref: "#/components/schemas/W02RepairAttempt" }
        assistDecision:
          oneOf:
            - $ref: "#/components/schemas/W03AssistDecision"
            - type: 'null'
        intentionalDivergenceDecision:
          oneOf:
            - $ref: "#/components/schemas/IntentionalDivergenceDecision"
            - type: 'null'
        intentionalDivergenceDecisionRef:
          oneOf:
            - $ref: "#/components/schemas/ArtifactMetadata"
            - type: 'null'
        failureMessage:
          oneOf:
            - type: string
            - type: 'null'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    W02RepairAttempt:
      type: object
      required: [attemptNumber, repairDecision, createdAt]
      additionalProperties: true
      properties:
        attemptNumber: { type: integer, minimum: 1 }
        repairDecision:
          type: string
          enum: [propose_candidate, refuse, escalate, no_change]
        failureCategory:
          oneOf:
            - type: string
            - type: 'null'
        createdAt: { type: string, format: date-time }
        refusalCode: { type: string }
        escalationCode: { type: string }
        modelInvocationRef:
          type: object
          additionalProperties: true
        repairInputRef:
          type: object
          additionalProperties: true
        repairDecisionRef:
          type: object
          additionalProperties: true
        buildTestResultRef:
          type: object
          additionalProperties: true
        javaCandidateRef:
          type: object
          additionalProperties: true
        rationale: { type: string }
        diffFromPreviousRef:
          type: object
          additionalProperties: true
    W04ParityComparisonProjection:
      type: object
      required:
        - status
        - matched
        - comparisonPolicyVersion
        - executionResultRef
        - comparisonResultRef
        - mismatchClassification
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [passed, failed, blocked]
        matched:
          type: boolean
        comparisonPolicyVersion:
          type: string
        comparisonPolicyRef:
          type: object
          additionalProperties: true
        executionResultRef:
          type: object
          additionalProperties: true
        comparisonResultRef:
          type: object
          additionalProperties: true
        diffRef:
          type: object
          additionalProperties: true
        decisionRecordRef:
          type: object
          additionalProperties: true
        documentedDecisionRef:
          type: object
          additionalProperties: true
        decisionStatus:
          type: string
          enum: [active, expired, stale, invalid, legacy, none]
        mismatchClassification:
          type: string
          enum:
            - none
            - content
            - formatting
            - line_endings
            - stderr
            - exit_code
            - runtime_failure
            - unsupported_input
            - policy
            - unknown
    W02StateTransition:
      type: object
      required: [state, at]
      properties:
        state: { type: string }
        at: { type: string, format: date-time }
        message: { type: string }
        failureCode: { type: string }
    W02RepairBudget:
      type: object
      required: [limit, used, remaining]
      properties:
        limit: { type: integer, minimum: 1, maximum: 3 }
        used: { type: integer, minimum: 0 }
        remaining: { type: integer, minimum: 0 }
    W03AssistBudget:
      type: object
      required: [limit, used, remaining]
      properties:
        limit: { type: integer, minimum: 1, maximum: 3 }
        used: { type: integer, minimum: 0 }
        remaining: { type: integer, minimum: 0 }
    W03ModelInvocationBudget:
      type: object
      required: [limit, used, remaining]
      properties:
        limit: { type: integer, minimum: 1, maximum: 20 }
        used: { type: integer, minimum: 0 }
        remaining: { type: integer, minimum: 0 }
    W03AssistDecision:
      type: object
      required: [outcome, reasonCode, decidedAt]
      properties:
        outcome:
          type: string
          enum: [assist_required, assist_not_required]
        reasonCode:
          type: string
          enum:
            - semantic_ir_bounded_ambiguity
            - translation_unsupported_repairable
            - baseline_open_assumptions
            - deterministic_candidate_low_confidence
            - caller_explicit_opt_in
            - caller_did_not_opt_in
            - assist_budget_exhausted
        decidedAt: { type: string, format: date-time }
        selectedAgentRole:
          oneOf:
            - type: string
              enum: [transformation_agent]
            - type: 'null'
        affectedArtifactRefs:
          type: array
          items:
            type: object
            additionalProperties: true
        repairBudgetSnapshot:
          oneOf:
            - $ref: "#/components/schemas/W02RepairBudget"
            - type: 'null'
        assistBudgetSnapshot:
          oneOf:
            - $ref: "#/components/schemas/W03AssistBudget"
            - type: 'null'
        modelInvocationBudgetSnapshot:
          oneOf:
            - $ref: "#/components/schemas/W03ModelInvocationBudget"
            - type: 'null'
        rationale:
          oneOf:
            - type: string
            - type: 'null'
    IntentionalDivergenceDecisionRequest:
      type: object
      required:
        - reasonCode
        - reviewer
        - rationale
        - linkedEvidenceRefs
        - affectedOutputs
        - invalidationTriggers
      additionalProperties: false
      properties:
        reasonCode:
          type: string
          enum:
            - business_rule_alignment
            - legacy_defect_correction
            - target_platform_constraint
            - accepted_functional_change
        reviewer:
          type: object
          required: [reviewerId, displayName, role]
          additionalProperties: false
          properties:
            reviewerId: { type: string, minLength: 1 }
            displayName: { type: string, minLength: 1 }
            role: { type: string, minLength: 1 }
        rationale:
          type: object
          required: [summary, technicalBasis, businessImpact]
          additionalProperties: false
          properties:
            summary: { type: string, minLength: 1 }
            technicalBasis: { type: string, minLength: 1 }
            businessImpact: { type: string, minLength: 1 }
            followUp: { type: string, minLength: 1 }
        linkedEvidenceRefs:
          type: array
          minItems: 1
          items:
            type: object
            required: [uri, sha256, byteSize]
            additionalProperties: true
            properties:
              uri: { type: string }
              sha256:
                type: string
                pattern: "^[0-9a-fA-F]{64}$"
              byteSize:
                type: integer
                minimum: 0
        affectedOutputs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum:
              - java_output
              - normalized_output
              - stderr
              - exit_code
              - evidence_summary
        invalidationTriggers:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum:
              - comparison_result_changed
              - affected_outputs_changed
              - linked_evidence_changed
              - expires_at_reached
        expiresAt:
          type: string
          format: date-time
    IntentionalDivergenceDecision:
      type: object
      required:
        - schemaVersion
        - decisionType
        - decisionId
        - runId
        - workflowId
        - comparisonResultRef
        - reviewer
        - rationale
        - linkedEvidenceRefs
        - affectedOutputs
        - invalidationTriggers
        - decidedAt
      additionalProperties: false
      properties:
        schemaVersion: { type: string, const: v0 }
        decisionType: { type: string, const: intentional_divergence }
        decisionId: { type: string, minLength: 1 }
        runId: { type: string, minLength: 1 }
        workflowId: { type: string, minLength: 1 }
        comparisonResultRef:
          type: object
          required: [uri, sha256, byteSize]
          additionalProperties: true
          properties:
            uri: { type: string }
            sha256:
              type: string
              pattern: "^[0-9a-fA-F]{64}$"
            byteSize:
              type: integer
              minimum: 0
        reviewer:
          type: object
          required: [reviewerId, displayName, role]
          additionalProperties: false
          properties:
            reviewerId: { type: string, minLength: 1 }
            displayName: { type: string, minLength: 1 }
            role: { type: string, minLength: 1 }
        rationale:
          type: object
          required: [summary, technicalBasis, businessImpact]
          additionalProperties: false
          properties:
            summary: { type: string, minLength: 1 }
            technicalBasis: { type: string, minLength: 1 }
            businessImpact: { type: string, minLength: 1 }
            followUp: { type: string, minLength: 1 }
        linkedEvidenceRefs:
          type: array
          minItems: 1
          items:
            type: object
            required: [uri, sha256, byteSize]
            additionalProperties: true
            properties:
              uri: { type: string }
              sha256:
                type: string
                pattern: "^[0-9a-fA-F]{64}$"
              byteSize:
                type: integer
                minimum: 0
        affectedOutputs:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum:
              - java_output
              - normalized_output
              - stderr
              - exit_code
              - evidence_summary
        invalidationTriggers:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum:
              - comparison_result_changed
              - affected_outputs_changed
              - linked_evidence_changed
              - expires_at_reached
        decidedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IntentionalDivergenceDecisionResponse:
      type: object
      required: [runId, decision, decisionRef, trustSummary]
      additionalProperties: false
      properties:
        runId: { type: string }
        decision:
          $ref: "#/components/schemas/IntentionalDivergenceDecision"
        decisionRef:
          $ref: "#/components/schemas/ArtifactMetadata"
        trustSummary:
          type: object
          additionalProperties: true
