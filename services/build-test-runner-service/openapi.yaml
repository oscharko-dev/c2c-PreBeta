openapi: 3.1.0
info:
  title: build-test-runner-service
  version: 0.1.0
  description: >
    W0 capability service that compiles and runs generated Java projects from
    target-java-generation-service, compares stdout against a Golden Master
    fixture, classifies failures, and produces a hash-referenced result for
    the Evidence Pack v0. Conformant to target-generator-contract-v0 because
    it consumes a contract-shaped generated project payload.
servers:
  - url: http://localhost:8084
    description: local
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v0/format-java:
    post:
      summary: Format Java source via google-java-format
      operationId: formatJava
      description: >
        Studio-IDE-14 (#256): deterministic Java formatter for the
        c2c-studio Java editor. The supplied content is formatted with
        google-java-format. The call is stateless and emits no Harness/
        Experience events: formatting is a UI affordance, not a
        verification outcome.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FormatJavaRequest"
      responses:
        "200":
          description: Source formatted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormatJavaResponse"
        "400":
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormatJavaError"
        "401":
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Source could not be formatted (parse error, invalid Java)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormatJavaError"
  /v0/run-verification:
    post:
      summary: Compile, run, and compare a generated Java project
      operationId: runVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunVerificationRequest"
      responses:
        "200":
          description: Verification completed (status reflects the build/test outcome)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTestResult"
        "400":
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Verification could not be performed (missing project, missing golden master, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTestResult"
        "500":
          description: Internal error inside the runner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v0/source-reference/execute:
    post:
      summary: Execute a controlled source/reference context for Trust-3
      operationId: executeSourceReference
      description: >
        Trust-3 controlled source/reference adapter. The request must identify
        an approved acceptance fixture and an explicit reference mode. The
        service returns the shared parity execution result contract for either
        `reference-fixture` or `native-cobol`; it does not accept arbitrary
        commands, file paths, or inline COBOL source.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceReferenceExecutionRequest"
      responses:
        "200":
          description: Source/reference execution completed with a structured result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceReferenceExecutionResult"
        "400":
          description: Malformed or unsafe request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request body too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
    FormatJavaRequest:
      type: object
      required: [content]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
          default: v0
        content:
          type: string
          description: Java source to format.
        filePath:
          type: string
          description: Optional file path included in upstream error messages.
    FormatJavaResponse:
      type: object
      required: [schemaVersion, formattedContent]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        formattedContent:
          type: string
          description: Formatted Java source. Idempotent on already-formatted input.
    FormatJavaError:
      type: object
      required: [schemaVersion, status, error]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        status:
          type: string
          enum: [failed]
        error:
          type: string
        line:
          type: integer
          minimum: 1
        column:
          type: integer
          minimum: 1
    RunVerificationRequest:
      type: object
      description: >
        Caller passes either the contract-shaped "generatedProject" object
        directly, or a "generationResponse" envelope (such as the response
        returned by target-java-generation-service).
      required: [programId]
      properties:
        runId:
          type: string
        workflowId:
          type: string
        sourceRef:
          type: object
          additionalProperties: true
        programId:
          type: string
          description: Logical COBOL program id used to look up the Golden Master.
        generatedProject:
          type: object
          additionalProperties: true
        generationResponse:
          type: object
          additionalProperties: true
        goldenMaster:
          $ref: "#/components/schemas/GoldenMasterHint"
        oracle:
          $ref: "#/components/schemas/OracleRequest"
        options:
          $ref: "#/components/schemas/RunOptions"
    OracleRequest:
      type: object
      description: >
        Executable oracle for UI-provided COBOL source (Issue #92). When
        present with mode "cobol-runtime", the runner compiles and executes
        the supplied COBOL source with GnuCOBOL and compares its stdout
        against the generated Java stdout instead of consulting the registry
        Golden Master. If omitted, registry Golden Master behaviour is
        preserved unchanged.
      required: [mode]
      properties:
        mode:
          type: string
          enum: [cobol-runtime]
          description: Oracle backend. Only "cobol-runtime" is supported at W0.
        sourceText:
          type: string
          description: >
            Full COBOL source to compile with cobc and execute with cobcrun.
            Required when mode is "cobol-runtime".
        sourceRef:
          type: object
          description: >
            Optional content-addressed reference to the originating source,
            echoed back in the response oracle block for evidence packs.
          properties:
            uri: { type: string }
            sha256: { type: string }
            byteSize: { type: integer }
        timeoutMs:
          type: integer
          minimum: 100
          maximum: 30000
          description: Per-process wall-clock budget for cobc and cobcrun.
    GoldenMasterHint:
      type: object
      properties:
        expected:
          type: string
        expectedRef:
          type: object
          properties:
            path:
              type: string
        classification:
          type: string
          enum: ["true", "synthetic"]
        source:
          type: string
        cobolSource:
          type: string
    RunOptions:
      type: object
      properties:
        skipExecution:
          type: boolean
          default: false
        compareOutput:
          type: boolean
          default: true
        timeoutMs:
          type: integer
          minimum: 100
          maximum: 30000
          default: 5000
    BuildTestResult:
      type: object
      description: >
        Legacy build-test envelope retained for current W0 callers. The nested
        generated-Java `build` and `execution` payloads follow the Trust-2
        shared parity result shape, with a small compatibility superset for
        existing BFF/orchestrator consumers.
      required: [schemaVersion, capability, status, classification, outputRef]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        capability:
          type: string
          enum: ["build-test.run"]
        runId:
          type: string
        workflowId:
          type: string
        programId:
          type: string
        sourceArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        generatedArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        inputArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        status:
          type: string
          enum:
            - ok
            - compile-failed
            - run-failed
            - output-divergence
            - golden-master-reproduction-failed
            - missing-golden-master
            - skipped
            - oracle-unavailable
            - oracle-cobol-compile-failed
            - oracle-cobol-run-failed
            - oracle-invalid
        classification:
          type: string
          enum:
            - match
            - divergence-known-w0-coverage-gap
            - divergence-unknown
            - true-golden-master-reproduction-error
            - true-golden-master-mismatch
            - compile-error
            - run-error
            - skipped-no-execution
            - missing-golden-master
            - oracle-unavailable
            - oracle-cobol-compile-error
            - oracle-cobol-run-error
            - oracle-invalid-request
        build:
          $ref: "#/components/schemas/GeneratedJavaBuildResult"
        buildResult:
          $ref: "#/components/schemas/CanonicalGeneratedJavaBuildResult"
        execution:
          $ref: "#/components/schemas/GeneratedJavaExecutionResult"
        executionResult:
          $ref: "#/components/schemas/CanonicalGeneratedJavaExecutionResult"
        tests:
          type: object
        goldenMaster:
          type: object
          properties:
            programId:
              type: string
            expected:
              type: string
            expectedSha256:
              type: string
            classification:
              type: string
              enum: ["true", "synthetic"]
            source:
              type: string
            cobolSource:
              type: string
            knownDivergenceAtW0:
              type: boolean
            cobolRuntime:
              type: object
              properties:
                attempted:
                  type: boolean
                available:
                  type: boolean
                compileOk:
                  type: boolean
                ran:
                  type: boolean
                ok:
                  type: boolean
                matched:
                  type: boolean
                compileExitCode:
                  type: integer
                exitCode:
                  type: integer
                stdout:
                  type: string
                stderr:
                  type: string
                stdoutSha256:
                  type: string
                durationMs:
                  type: integer
                reason:
                  type: string
                programId:
                  type: string
                cobolSource:
                  type: string
                moduleName:
                  type: string
                compiler:
                  type: string
                runtime:
                  type: string
                cobcVersion:
                  type: string
                cobcrunVersion:
                  type: string
        oracle:
          type: object
          description: >
            Present when the request supplied an executable oracle. The
            mode field echoes the request mode. The other fields describe
            availability, compile/run status, captured stdout (and its
            SHA-256), captured stderr, the resolved COBOL module name, and
            the toolchain versions used.
          properties:
            mode:
              type: string
              enum: [cobol-runtime]
            attempted: { type: boolean }
            available: { type: boolean }
            compileOk: { type: boolean }
            ran: { type: boolean }
            runOk: { type: boolean }
            compileExitCode: { type: integer }
            exitCode: { type: integer }
            stdout: { type: string }
            stderr: { type: string }
            stdoutSha256: { type: string }
            durationMs: { type: integer }
            reason: { type: string }
            moduleName: { type: string }
            compiler: { type: string }
            runtime: { type: string }
            cobcVersion: { type: string }
            cobcrunVersion: { type: string }
            sourceRef:
              type: object
              properties:
                uri: { type: string }
                sha256: { type: string }
                byteSize: { type: integer }
        comparison:
          type: object
          description: Legacy comparison block retained for compatibility.
        comparisonResult:
          type: object
          description: >
            Canonical deterministic parity comparison result. Carries the
            comparison policy version, output references, diff summary, diff
            reference, and mismatch classification for the run.
        comparisonResultRef:
          $ref: "#/components/schemas/ArtifactReference"
        outputRef:
          type: object
        diagnostics:
          type: array
          items:
            type: object
    SourceReferenceExecutionRequest:
      type: object
      required: [runId, fixtureId, referenceMode]
      properties:
        executionId:
          type: string
          description: Optional stable identifier for the source/reference execution record.
        runId:
          type: string
        workflowId:
          type: string
        fixtureId:
          type: string
          description: Approved fixture identifier from fixtures/acceptance/index.json.
        referenceMode:
          type: string
          enum: [reference-fixture, native-cobol]
          description: >
            reference-fixture reads the checked-in expected output artifact.
            native-cobol executes the approved COBOL source with GnuCOBOL.
        timeoutMs:
          type: integer
          minimum: 100
          maximum: 30000
          description: Timeout budget used only for native-cobol mode.
    SourceReferenceExecutionResult:
      type: object
      description: >
        Shared parity execution result contract for the source/reference side.
        The executable schema source of truth is schemas/parity-execution-result-v0.json.
      required:
        - schemaVersion
        - executionId
        - runId
        - executionSurface
        - referenceMode
        - command
        - status
        - exitCode
        - timedOut
        - stdoutRef
        - stderrRef
        - normalizedOutputRef
        - diagnostics
        - createdAt
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        executionId:
          type: string
        runId:
          type: string
        workflowId:
          type: string
        executionSurface:
          type: string
          enum: [source-reference]
        referenceMode:
          type: string
          enum: [reference-fixture, native-cobol]
        command:
          type: string
        status:
          type: string
          enum: [passed, failed, timed_out, skipped]
        exitCode:
          type: integer
          nullable: true
        timedOut:
          type: boolean
        stdoutRef:
          $ref: "#/components/schemas/ArtifactReference"
        stderrRef:
          $ref: "#/components/schemas/ArtifactReference"
        normalizedOutputRef:
          $ref: "#/components/schemas/ArtifactReference"
        sourceArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        inputArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        referenceArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionDiagnostic"
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        summary:
          type: string
        outputRef:
          $ref: "#/components/schemas/ArtifactReference"
    GeneratedJavaBuildResult:
      type: object
      description: >
        Trust-2 aligned generated-Java build result. The executable schema
        source of truth is schemas/parity-build-result-v0.json; legacy fields
        such as `compileOk` remain for compatibility.
      required:
        - schemaVersion
        - buildId
        - runId
        - buildMode
        - command
        - status
        - inputArtifactRef
        - buildOutputRef
        - logRef
        - diagnostics
        - createdAt
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        buildId:
          type: string
        runId:
          type: string
        workflowId:
          type: string
        buildMode:
          type: string
          enum: [generated-java]
        command:
          type: string
        toolchain:
          type: string
        status:
          type: string
          enum: [passed, failed, skipped]
        inputArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        buildOutputRef:
          $ref: "#/components/schemas/ArtifactReference"
        logRef:
          $ref: "#/components/schemas/ArtifactReference"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/BuildDiagnostic"
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        summary:
          type: string
        evidenceRefs:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactReference"
        outputRef:
          $ref: "#/components/schemas/ArtifactReference"
        compileOk:
          type: boolean
          description: Compatibility field for current W0 consumers.
        sourceCount:
          type: integer
          minimum: 0
        fileCount:
          type: integer
          minimum: 0
        classOutputDir:
          type: string
    CanonicalGeneratedJavaBuildResult:
      allOf:
        - $ref: "#/components/schemas/GeneratedJavaBuildResult"
      description: >
        Exact Trust-2 generated-Java build result without the legacy
        compatibility fields carried in `build`.
    GeneratedJavaExecutionResult:
      type: object
      description: >
        Trust-2 aligned generated-Java execution result. The executable schema
        source of truth is schemas/parity-execution-result-v0.json; legacy
        fields such as `ran`, `ok`, `stdout`, and `stderr` remain for
        compatibility.
      required:
        - schemaVersion
        - executionId
        - runId
        - executionSurface
        - command
        - status
        - exitCode
        - timedOut
        - stdoutRef
        - stderrRef
        - normalizedOutputRef
        - diagnostics
        - createdAt
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        executionId:
          type: string
        runId:
          type: string
        workflowId:
          type: string
        executionSurface:
          type: string
          enum: [generated-java]
        command:
          type: string
        status:
          type: string
          enum: [passed, failed, timed_out, skipped]
        exitCode:
          type: integer
          nullable: true
        timedOut:
          type: boolean
        stdoutRef:
          $ref: "#/components/schemas/ArtifactReference"
        stderrRef:
          $ref: "#/components/schemas/ArtifactReference"
        normalizedOutputRef:
          $ref: "#/components/schemas/ArtifactReference"
        outputRef:
          $ref: "#/components/schemas/ArtifactReference"
        logRef:
          $ref: "#/components/schemas/ArtifactReference"
        sourceArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        inputArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        generatedArtifactRef:
          $ref: "#/components/schemas/ArtifactReference"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionDiagnostic"
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        summary:
          type: string
        evidenceRefs:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactReference"
        ran:
          type: boolean
          description: Compatibility field for current W0 consumers.
        ok:
          type: boolean
          description: Compatibility field for current W0 consumers.
        stdout:
          type: string
        stderr:
          type: string
        durationMs:
          type: integer
          minimum: 0
        stdoutSha256:
          type: string
        errorClass:
          type: string
        errorMessage:
          type: string
    CanonicalGeneratedJavaExecutionResult:
      allOf:
        - $ref: "#/components/schemas/GeneratedJavaExecutionResult"
      description: >
        Exact Trust-2 generated-Java execution result without the legacy
        compatibility fields carried in `execution`.
    ArtifactReference:
      type: object
      required: [uri, sha256, byteSize]
      description: Content-addressed artifact reference shared across build and execution payloads.
      properties:
        uri:
          type: string
        sha256:
          type: string
        byteSize:
          type: integer
        mimeType:
          type: string
        kind:
          type: string
    ExecutionDiagnostic:
      type: object
      required: [severity, message]
      properties:
        severity:
          type: string
          enum: [info, warning, error]
        code:
          type: string
        message:
          type: string
        filePath:
          type: string
        line:
          type: integer
          minimum: 1
        column:
          type: integer
          minimum: 1
        rawLogRef:
          $ref: "#/components/schemas/ArtifactReference"
    BuildDiagnostic:
      type: object
      required: [filePath, line, column, severity, message]
      properties:
        severity:
          type: string
          enum: [info, warning, error]
        code:
          type: string
        message:
          type: string
        filePath:
          type: string
        line:
          type: integer
          minimum: 1
        column:
          type: integer
          minimum: 1
        rawLogRef:
          $ref: "#/components/schemas/ArtifactReference"
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
        error:
          type: string
