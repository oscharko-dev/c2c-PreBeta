openapi: 3.1.0
info:
  title: build-test-runner-service
  version: 0.1.0
  description: >
    W0 capability service that compiles and runs generated Java projects from
    target-java-generation-service, compares stdout against a Golden Master
    fixture, classifies failures, and produces a hash-referenced result for
    the Evidence Pack v0. Conformant to target-generator-contract-v0 because
    it consumes a contract-shaped generated project payload.
servers:
  - url: http://localhost:8084
    description: local
paths:
  /health:
    get:
      summary: Health check
      operationId: health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v0/run-verification:
    post:
      summary: Compile, run, and compare a generated Java project
      operationId: runVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunVerificationRequest"
      responses:
        "200":
          description: Verification completed (status reflects the build/test outcome)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTestResult"
        "400":
          description: Malformed request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Verification could not be performed (missing project, missing golden master, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildTestResult"
        "500":
          description: Internal error inside the runner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
    RunVerificationRequest:
      type: object
      description: >
        Caller passes either the contract-shaped "generatedProject" object
        directly, or a "generationResponse" envelope (such as the response
        returned by target-java-generation-service).
      required: [programId]
      properties:
        runId:
          type: string
        workflowId:
          type: string
        sourceRef:
          type: object
          additionalProperties: true
        programId:
          type: string
          description: Logical COBOL program id used to look up the Golden Master.
        generatedProject:
          type: object
          additionalProperties: true
        generationResponse:
          type: object
          additionalProperties: true
        goldenMaster:
          $ref: "#/components/schemas/GoldenMasterHint"
        oracle:
          $ref: "#/components/schemas/OracleRequest"
        options:
          $ref: "#/components/schemas/RunOptions"
    OracleRequest:
      type: object
      description: >
        Executable oracle for UI-provided COBOL source (Issue #92). When
        present with mode "cobol-runtime", the runner compiles and executes
        the supplied COBOL source with GnuCOBOL and compares its stdout
        against the generated Java stdout instead of consulting the registry
        Golden Master. If omitted, registry Golden Master behaviour is
        preserved unchanged.
      required: [mode]
      properties:
        mode:
          type: string
          enum: [cobol-runtime]
          description: Oracle backend. Only "cobol-runtime" is supported at W0.
        sourceText:
          type: string
          description: >
            Full COBOL source to compile with cobc and execute with cobcrun.
            Required when mode is "cobol-runtime".
        sourceRef:
          type: object
          description: >
            Optional content-addressed reference to the originating source,
            echoed back in the response oracle block for evidence packs.
          properties:
            uri: { type: string }
            sha256: { type: string }
            byteSize: { type: integer }
        timeoutMs:
          type: integer
          minimum: 100
          maximum: 30000
          description: Per-process wall-clock budget for cobc and cobcrun.
    GoldenMasterHint:
      type: object
      properties:
        expected:
          type: string
        expectedRef:
          type: object
          properties:
            path:
              type: string
        classification:
          type: string
          enum: ["true", "synthetic"]
        source:
          type: string
        cobolSource:
          type: string
    RunOptions:
      type: object
      properties:
        skipExecution:
          type: boolean
          default: false
        compareOutput:
          type: boolean
          default: true
        timeoutMs:
          type: integer
          minimum: 100
          maximum: 30000
          default: 5000
    BuildTestResult:
      type: object
      required: [schemaVersion, capability, status, classification, outputRef]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        capability:
          type: string
          enum: ["build-test.run"]
        runId:
          type: string
        workflowId:
          type: string
        programId:
          type: string
        status:
          type: string
          enum:
            - ok
            - compile-failed
            - run-failed
            - output-divergence
            - golden-master-reproduction-failed
            - missing-golden-master
            - skipped
            - oracle-unavailable
            - oracle-cobol-compile-failed
            - oracle-cobol-run-failed
            - oracle-invalid
        classification:
          type: string
          enum:
            - match
            - divergence-known-w0-coverage-gap
            - divergence-unknown
            - true-golden-master-reproduction-error
            - true-golden-master-mismatch
            - compile-error
            - run-error
            - skipped-no-execution
            - missing-golden-master
            - oracle-unavailable
            - oracle-cobol-compile-error
            - oracle-cobol-run-error
            - oracle-invalid-request
        build:
          type: object
        execution:
          type: object
        tests:
          type: object
        goldenMaster:
          type: object
          properties:
            programId:
              type: string
            expected:
              type: string
            expectedSha256:
              type: string
            classification:
              type: string
              enum: ["true", "synthetic"]
            source:
              type: string
            cobolSource:
              type: string
            knownDivergenceAtW0:
              type: boolean
            cobolRuntime:
              type: object
              properties:
                attempted:
                  type: boolean
                available:
                  type: boolean
                compileOk:
                  type: boolean
                ran:
                  type: boolean
                ok:
                  type: boolean
                matched:
                  type: boolean
                compileExitCode:
                  type: integer
                exitCode:
                  type: integer
                stdout:
                  type: string
                stderr:
                  type: string
                stdoutSha256:
                  type: string
                durationMs:
                  type: integer
                reason:
                  type: string
                programId:
                  type: string
                cobolSource:
                  type: string
                moduleName:
                  type: string
                compiler:
                  type: string
                runtime:
                  type: string
                cobcVersion:
                  type: string
                cobcrunVersion:
                  type: string
        oracle:
          type: object
          description: >
            Present when the request supplied an executable oracle. The
            mode field echoes the request mode. The other fields describe
            availability, compile/run status, captured stdout (and its
            SHA-256), captured stderr, the resolved COBOL module name, and
            the toolchain versions used.
          properties:
            mode:
              type: string
              enum: [cobol-runtime]
            attempted: { type: boolean }
            available: { type: boolean }
            compileOk: { type: boolean }
            ran: { type: boolean }
            runOk: { type: boolean }
            compileExitCode: { type: integer }
            exitCode: { type: integer }
            stdout: { type: string }
            stderr: { type: string }
            stdoutSha256: { type: string }
            durationMs: { type: integer }
            reason: { type: string }
            moduleName: { type: string }
            compiler: { type: string }
            runtime: { type: string }
            cobcVersion: { type: string }
            cobcrunVersion: { type: string }
            sourceRef:
              type: object
              properties:
                uri: { type: string }
                sha256: { type: string }
                byteSize: { type: integer }
        comparison:
          type: object
        outputRef:
          type: object
        diagnostics:
          type: array
          items:
            type: object
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
        error:
          type: string
