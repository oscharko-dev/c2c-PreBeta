openapi: 3.1.0
info:
  title: c2c-bff
  version: 0.2.0
  description: >
    W0 backend-for-frontend. Brokers c2c-ui calls to the W0 capability mesh
    (orchestrator-service, evidence-service, build-test-runner-service,
    target-java-generation-service, cobol-parser-service, semantic-ir-service,
    agentic-harness-core). Default product mode is fail-closed: when
    `C2C_ORCHESTRATOR_URL` is not configured, `POST /api/v0/runs` and
    `POST /api/v0/transform` return `503`. Diagnostic fixtures are
    opt-in via `C2C_ENABLE_DIAGNOSTIC_FIXTURES=true` and are labelled
    with `mode: "diagnostic-fixture"` and `productMode: "unavailable"`
    so the UI never displays them as a product result.

servers:
  - url: http://localhost:8090
    description: local

paths:
  /api/v0/health:
    get:
      summary: Service health probe
      operationId: health
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v0/mode:
    get:
      summary: Report upstream reachability (orchestrator and evidence-service)
      description: >
        Returns whether each configured upstream is reachable. `mock` here
        means "no upstream URL is configured"; it is distinct from the
        per-run `mode` and `productMode` fields, which describe an
        individual run.
      operationId: mode
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModeResponse"

  /api/v0/samples:
    get:
      summary: List W0 sample COBOL programs available to the UI
      operationId: listSamples
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Sample" }

  /api/v0/samples/{programId}:
    get:
      summary: Fetch a sample COBOL program by id
      operationId: getSample
      parameters:
        - in: path
          name: programId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SampleDetail" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/transform:
    post:
      summary: Start a product-mode transform from COBOL source text
      description: |
        Single entry point for product-mode transforms. Reference programs
        loaded via GET /api/v0/samples/{programId} are sent through this
        endpoint just like pasted source. If the request resolves to a
        registered reference program whose supportedInProductMode is false,
        the BFF returns 400 and never dispatches to the orchestrator.
      operationId: startTransform
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransformInput" }
      responses:
        "201":
          description: started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TransformResponse" }
        "400":
          description: validation error or unsupported reference program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: orchestrator rejected request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: orchestrator unavailable or not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs:
    post:
      summary: Legacy sample-based run start path
      operationId: startRun
      deprecated: true
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunStartInput" }
      responses:
        "201":
          description: started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunSummary" }
        "400":
          description: validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}:
    get:
      summary: Get current state for a W0 run
      operationId: getRun
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunSummary" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/generated:
    get:
      summary: Return generated Java for side-by-side display
      description: >
        The response includes `artifactRef` (the SHA-256-anchored reference to
        the generated-project manifest) and `traceability` (programId, irId,
        sourceHash). The same `artifactRef.sha256` appears as
        `generatedArtifactRef.sha256` on `/build-test` and `/evidence`, which
        is how Issue #97 guarantees the UI is showing the exact Java the
        build-test runner compiled and the Evidence Pack vouches for.
      operationId: getGenerated
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/generated/files:
    get:
      summary: List generated Java project files with per-file references
      description: >
        Returns the persisted generated-project file index for the run. Each
        entry includes path, sha256, byteSize, and mimeType so the UI (and any
        automation) can verify byte-for-byte what `/api/v0/runs/{runId}/generated/files/{encodedPath}`
        will return. The aggregate `artifactRef` is the SHA-256 of the
        manifest, identical to the one referenced by `/generated`,
        `/build-test`, and `/evidence`.
      operationId: getGeneratedFiles
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedFilesIndex" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/generated/files/{filePath}:
    get:
      summary: Return the content of a single generated Java project file
      description: >
        `filePath` is the relative path inside the generated project tree.
        Each path segment must be URL-encoded individually so directory
        separators are preserved (`src/main/java/c2c/CASE01.java` becomes
        `src/main/java/c2c/CASE01.java`). Path-traversal attempts (`..`,
        absolute paths, NUL bytes) return `400`. Unknown files inside the
        project tree return `404`.
      operationId: getGeneratedFile
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
        - in: path
          name: filePath
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedFileContent" }
        "400":
          description: invalid generated file path
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: file not found in generated project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: orchestrator unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/build-test:
    get:
      summary: Return build/test result for the run
      operationId: getBuildTest
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BuildTestView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/evidence:
    get:
      summary: Return Evidence Pack manifest reference and basic stats
      operationId: getEvidence
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/events:
    get:
      summary: Return a lightweight event view for the run
      operationId: getRunEvents
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunEventsView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/artifacts:
    get:
      summary: List persisted artifacts and metadata for the run
      description: >
        Proxies the orchestrator artifact index. Each artifact entry includes
        uri, sha256, byteSize, mimeType, kind, createdBy, createdAt, runId,
        workflowId, path, name. Missing artifacts are reported as
        `missingArtifacts`; the BFF never fabricates a successful response.
      operationId: getRunArtifacts
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunArtifactsView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: orchestrator failure
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string }

    ModeResponse:
      type: object
      required: [orchestrator, evidence]
      properties:
        orchestrator: { type: string, enum: [live, mock] }
        evidence: { type: string, enum: [live, mock] }

    Sample:
      description: |
        Reference program metadata exposed to the UI. The reference-program
        contract (Issue #94) is explicit: only entries with
        supportedInProductMode=true may be loaded and run through
        POST /api/v0/transform. Unsupported entries appear in listings as
        disabled so callers know they exist but cannot execute them.
      type: object
      required:
        - programId
        - title
        - knownDivergenceAtW0
        - supportedInProductMode
        - w0Subset
        - oracleMode
        - knownLimitations
      properties:
        programId: { type: string }
        title: { type: string }
        description: { type: string }
        knownDivergenceAtW0: { type: boolean }
        supportedInProductMode:
          type: boolean
          description: True iff this reference program can complete the real
            product path (parse → Semantic IR → Java generation → build/test →
            Evidence Pack) via POST /api/v0/transform.
        w0Subset:
          type: array
          description: COBOL verbs/constructs this reference program exercises
            within the W0 subset. Non-empty for supportedInProductMode=true.
          items: { type: string }
        oracleMode:
          description: How equivalence is proven for this program. Null only
            for unsupported entries.
          oneOf:
            - type: string
              enum: [cobol-runtime, synthetic-fixture]
            - type: "null"
        knownLimitations:
          type: array
          description: Documented W0 limitations for this program (empty if
            none known).
          items: { type: string }

    SampleDetail:
      allOf:
        - $ref: "#/components/schemas/Sample"
        - type: object
          required: [cobolSource, expectedOutput, cobolSourcePath, expectedOutputPath]
          properties:
            cobolSource: { type: string }
            expectedOutput: { type: string }
            cobolSourcePath: { type: string }
            expectedOutputPath: { type: string }

    RunStartInput:
      type: object
      required: [programId]
      properties:
        programId: { type: string }
        requester: { type: string }

    TransformInput:
      type: object
      required: [sourceText]
      properties:
        sourceText: { type: string }
        programId: { type: string }
        sourceName: { type: string }
        options:
          type: object
          additionalProperties: true

    RunSummary:
      type: object
      required: [runId, programId, status, mode, createdAt]
      properties:
        runId: { type: string }
        programId: { type: string }
        status:
          type: string
          enum: [starting, updating, completed, failed]
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        message: { type: string }
        evidenceRefs:
          type: array
          items: { type: string }
        policyDecision: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    RunLinks:
      type: object
      required: [self, generated, generatedFiles, buildTest, evidence, events, artifacts]
      properties:
        self: { type: string }
        generated: { type: string }
        generatedFiles: { type: string }
        buildTest: { type: string }
        evidence: { type: string }
        events: { type: string }
        artifacts: { type: string }

    TransformResponse:
      type: object
      required: [runId, orchestratorRunId, status, programId, productMode, links, createdAt, mode]
      properties:
        runId: { type: string }
        orchestratorRunId: { type: string }
        programId: { type: string }
        status:
          type: string
          enum: [starting, updating, completed, failed]
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        message: { type: string }
        evidenceRefs:
          type: array
          items: { type: string }
        policyDecision: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        links:
          $ref: "#/components/schemas/RunLinks"

    GeneratedView:
      type: object
      required: [runId, programId, mode, status]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status:
          type: string
          enum: [generated, unsupported, skipped, incomplete]
        entryClass: { type: string }
        entryFilePath: { type: string }
        fileCount: { type: integer, minimum: 0 }
        files:
          type: object
          additionalProperties: { type: string }
        fileRefs:
          type: array
          items: { $ref: "#/components/schemas/GeneratedFileRef" }
        unsupportedFeatures:
          type: array
          items: { type: string }
        openAssumptions:
          type: array
          items: { type: string }
        missingArtifacts:
          type: array
          items: { type: string }
        orchestratorRunId: { type: string }
        generationResponseRef:
          oneOf:
            - $ref: "#/components/schemas/RunArtifactMetadata"
            - type: 'null'
        artifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: >
            Reference to the generated-project manifest. The same sha256 is
            reported by /build-test (`generatedArtifactRef`) and /evidence
            (`generatedArtifactRef`), enforcing the Issue #97 consistency
            requirement.
        traceability:
          $ref: "#/components/schemas/GeneratedTraceability"
        note: { type: string }

    GeneratedFileRef:
      type: object
      required: [path]
      properties:
        path: { type: string }
        absolutePath: { type: string }
        uri: { type: string }
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }

    GeneratedTraceability:
      type: object
      required: [programId, irId, sourceHash]
      properties:
        programId: { type: string }
        irId: { type: string }
        sourceHash: { type: string }

    OutputRef:
      type: object
      required: [uri, sha256]
      properties:
        uri: { type: string }
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }

    GeneratedFilesIndex:
      type: object
      required: [runId, programId, mode, status, files, fileCount]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status: { type: string, enum: [complete, incomplete] }
        files:
          type: array
          items: { $ref: "#/components/schemas/GeneratedFileRef" }
        fileCount: { type: integer, minimum: 0 }
        entryFilePath: { type: string }
        artifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        missingArtifacts:
          type: array
          items: { type: string }
        orchestratorRunId: { type: string }
        note: { type: string }

    GeneratedFileContent:
      type: object
      required: [runId, path, content, sha256, byteSize, mimeType]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        path: { type: string }
        absolutePath: { type: string }
        content: { type: string }
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        uri: { type: string }
        kind: { type: string }
        orchestratorRunId: { type: string }

    BuildTestView:
      type: object
      required: [runId, programId, mode, status, classification]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status:
          type: string
          enum:
            [
              ok,
              compile-failed,
              run-failed,
              output-divergence,
              golden-master-reproduction-failed,
              missing-golden-master,
              skipped,
              incomplete,
            ]
        classification:
          type: string
          enum:
            [
              match,
              divergence-known-w0-coverage-gap,
              divergence-unknown,
              true-golden-master-reproduction-error,
              true-golden-master-mismatch,
              compile-error,
              run-error,
              skipped-no-execution,
            ]
        expectedOutput: { type: string }
        actualOutput: { type: string }
        outputRef: { type: string }
        generatedArtifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: >
            Issue #97 consistency anchor — sha256 of the generated-project
            manifest that the runner compiled. Equal to the same field on
            /generated and /evidence.
        note: { type: string }

    EvidenceView:
      type: object
      required: [runId, programId, mode, status]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status:
          type: string
          enum: [complete, incomplete]
        packId: { type: string }
        manifestUri: { type: string }
        missingArtifacts:
          type: array
          items: { type: string }
        orchestratorRunId: { type: string }
        artifactRef:
          oneOf:
            - $ref: "#/components/schemas/RunArtifactMetadata"
            - type: 'null'
        generatedArtifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: >
            Issue #97 consistency anchor — same sha256 as
            BuildTestView.generatedArtifactRef and GeneratedView.artifactRef.
        note: { type: string }

    RunArtifactMetadata:
      type: object
      required: [uri, sha256, byteSize, mimeType, kind, createdBy, createdAt, runId, workflowId, path, name]
      properties:
        uri: { type: string }
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        kind: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        runId: { type: string }
        workflowId: { type: string }
        path: { type: string }
        name: { type: string }

    RunArtifactsView:
      type: object
      required: [runId, mode, artifacts]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        orchestratorRunId: { type: string }
        artifacts:
          type: array
          items: { $ref: "#/components/schemas/RunArtifactMetadata" }
        summary:
          type: object
          additionalProperties: true
        missingArtifacts:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        note: { type: string }

    RunEventsView:
      type: object
      required: [runId, programId, mode, events]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        events:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              status: { type: string }
              message: { type: string }
              createdAt: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
