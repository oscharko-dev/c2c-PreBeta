openapi: 3.1.0
info:
  title: c2c-bff
  version: 0.3.0
  description: >
    W0 backend-for-frontend. Brokers c2c-ui calls to the W0 capability mesh
    (orchestrator-service, evidence-service, build-test-runner-service,
    target-java-generation-service, cobol-parser-service, semantic-ir-service,
    agentic-harness-core). Default product mode is fail-closed: when
    `C2C_ORCHESTRATOR_URL` is not configured, `POST /api/v0/runs` and
    `POST /api/v0/transform` return `503`. Diagnostic fixtures are
    opt-in via `C2C_ENABLE_DIAGNOSTIC_FIXTURES=true` and are labelled
    with `mode: "diagnostic-fixture"` and `productMode: "unavailable"`
    so the UI never displays them as a product result.

servers:
  - url: http://localhost:8090
    description: local

paths:
  /api/v0/health:
    get:
      summary: Service health probe
      operationId: health
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v0/csp-report:
    post:
      summary: Receive a browser CSP violation report
      description: >
        Issue #271 / ADR-0005 §6: receiver for browser CSP violation
        reports. Accepts both the legacy `application/csp-report`
        envelope and the Reporting API v2 `application/reports+json`
        batch shape. The endpoint is intentionally unauthenticated
        because the browser cannot attach credentials to `report-uri`
        requests. Sanitisation strips query strings, fragments, and
        any non-allowlisted fields before the report reaches the log
        sink, so no PII leaks server-side.
      operationId: cspReport
      requestBody:
        required: true
        content:
          application/csp-report:
            schema:
              type: object
              additionalProperties: true
          application/reports+json:
            schema:
              type: array
              items:
                type: object
                additionalProperties: true
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "204":
          description: report accepted (no body)
        "400":
          description: malformed envelope or empty batch
        "413":
          description: body exceeds the 64 KiB cap
        "415":
          description: unsupported content-type

  /api/v0/session/sign-in:
    post:
      summary: Dev-mode session sign-in (mints opaque tenantId / userId + cookie)
      description: >
        Issue #272 / ADR-0005 §2 "Named prerequisites": when the BFF
        is deployed without a real identity layer behind the bootstrap,
        Studio satisfies the draft-key prerequisite via this endpoint.
        Mints opaque pseudonymous `tenantId` and `userId` (UUID-shaped
        random hex), allocates a fresh `draftKeyWrappingSecret` keyed
        by `sessionId` server-side, and sets the `c2c.sid` cookie
        (`HttpOnly; SameSite=Lax; Path=/; Secure` when TLS-terminated).
        The response body intentionally omits the wrapping secret —
        it is delivered by `POST /api/v0/session/bootstrap` only, so
        the sign-in request itself is not a vector for key-material
        exposure in network logs.

        The body accepts optional `tenantId` / `userId` overrides for
        test fixtures and dev tooling; the server rejects values that
        contain `@` or whitespace (ADR-0005 §3 defensive check
        against accidental email leakage into IndexedDB plaintext
        keys).

        Returns 404 in deployments that have disabled fixture
        sessions via `C2C_ENABLE_FIXTURE_SESSIONS=false` (production
        with a real IdP integration).
      operationId: sessionSignIn
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionSignInRequest"
      responses:
        "200":
          description: session minted; `c2c.sid` cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
              description: >
                `c2c.sid=<opaque hex>; Path=/; HttpOnly; SameSite=Lax`
                (with `Secure` appended when the request was TLS-terminated).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSignInResponse"
        "400":
          description: tenantId / userId contained `@` or whitespace
        "404":
          description: fixture sessions are disabled in this deployment
        "413":
          description: request body exceeded the 10 KiB cap

  /api/v0/session/bootstrap:
    post:
      summary: Return the draft-key wrapping secret for the current auth session
      description: >
        Issue #272 / ADR-0005 §2 "Encryption at Rest": Studio fetches
        this endpoint at app start (and on every reload) to obtain the
        `draftKeyWrappingSecret` it uses as HKDF input keying material
        for AES-GCM encryption of IndexedDB-backed drafts. The
        endpoint requires the `c2c.sid` session cookie and returns the
        **same** wrapping secret for the lifetime of the auth session
        — a reload re-fetches and can decrypt drafts written earlier
        in the session. Rotation happens only at the next sign-in;
        logout deletes the secret and drafts encrypted under it
        become permanently unreadable.

        Studio holds the wrapping secret in memory only; it must
        never be written to storage, logged, or re-sent.
      operationId: sessionBootstrap
      responses:
        "200":
          description: wrapping secret returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionBootstrapResponse"
        "401":
          description: >
            session cookie missing or referenced a session that no
            longer exists (BFF restart, logout, or forged cookie).
            On the cookie-mismatch path the response also clears the
            cookie so the browser stops replaying the dead identifier.

  /api/v0/session/logout:
    post:
      summary: Delete the server-side session and clear the cookie
      description: >
        Issue #272 / ADR-0005 §2 "Rotation": deletes the server-side
        session record keyed by the `c2c.sid` cookie and emits a
        `Set-Cookie` header that clears the cookie. Drafts encrypted
        under the deleted wrapping secret become permanently
        unreadable. Idempotent: returns 204 whether or not the
        cookie / record existed.
      operationId: sessionLogout
      responses:
        "204":
          description: session deleted (or never existed); cookie cleared

  /api/v0/mode:
    get:
      summary: Report upstream reachability (orchestrator and evidence-service)
      description: >
        Returns whether each configured upstream is reachable. `mock` here
        means "no upstream URL is configured"; it is distinct from the
        per-run `mode` and `productMode` fields, which describe an
        individual run.
      operationId: mode
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModeResponse"

  /api/v0/samples:
    get:
      summary: List W0 sample COBOL programs available to the UI
      operationId: listSamples
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Sample" }

  /api/v0/samples/{programId}:
    get:
      summary: Fetch a sample COBOL program by id
      operationId: getSample
      parameters:
        - in: path
          name: programId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SampleDetail" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/acceptance-fixtures:
    get:
      summary: List W0.2 acceptance fixtures (Issue #174)
      description: |
        W0.2 acceptance-fixture registry. Each entry declares a small,
        user-pasteable COBOL program plus an oracle contract that the
        end-to-end agentic workflow must satisfy: the generated Java
        compiles, executes, and matches the declared expected output (for
        success fixtures), or the orchestrator blocks honestly with
        `unsupported_cobol` (for blocked fixtures). The registry is
        validated against schemas/acceptance-fixture-v0.json at BFF boot.
      operationId: listAcceptanceFixtures
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AcceptanceFixtureSummary" }

  /api/v0/acceptance-fixtures/{fixtureId}:
    get:
      summary: Fetch a W0.2 acceptance fixture by id
      operationId: getAcceptanceFixture
      parameters:
        - in: path
          name: fixtureId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AcceptanceFixtureDetail" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/editor/explain:
    post:
      summary: Explain a selected COBOL or Java editor region
      description: >
        ADR 0004 editor-assist channel. The request carries bytes that
        Studio has already pre-redacted per ADR 0005 §4, plus the SHA-256
        byteHash over those exact bytes. The BFF verifies the hash, consumes
        one `editorAssistBudget` unit, calls the Model Gateway `/v0/explain`
        boundary, and writes a `kind=editor_assist` ledger entry. The channel
        is non-productive: it never advances an Orchestrator run, never
        produces an `assistDecision`, and never enters a run evidence pack.
        Identity is bound to the active `c2c.sid` session cookie; callers
        must not rely on body-supplied `tenantId` or `userId` for authority.
      operationId: explainEditorRegion
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EditorExplainRequest" }
      responses:
        "200":
          description: explanation returned and ledgered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorExplainResponse" }
        "400":
          description: invalid region, malformed payload, empty region, oversized region, or byteHash mismatch
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorExplainErrorResponse" }
        "403":
          description: Model Gateway policy denied the request, session cookie is unavailable, or optional tenantId/userId does not match the active session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorExplainErrorResponse" }
        "415":
          description: request was not sent as application/json
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorExplainErrorResponse" }
        "429":
          description: per-session budget or per-tenant-per-day cap exhausted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorExplainErrorResponse" }
        "503":
          description: Model Gateway disabled or unavailable, unusable gateway response, or editor-assist ledger sink unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorExplainErrorResponse" }
        "504":
          description: Model Gateway timed out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorExplainErrorResponse" }

  /api/v0/editor/budget:
    get:
      summary: Return the current editor-assist budget snapshot
      description: >
        Returns the current `editorAssistBudget` snapshot for the active
        `c2c.sid` session. `sessionId` is the client-issued Studio
        editor session identifier; it is syntax-validated for request
        correlation, while the budget scope is always derived from the
        session cookie. Optional `tenantId` and `userId` query copies must
        match that active session.
      operationId: getEditorAssistBudget
      parameters:
        - in: query
          name: sessionId
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9._\\-]+$"
        - in: query
          name: tenantId
          required: false
          deprecated: true
          description: Optional legacy echo; when present it must match the active session identity.
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9._\\-]+$"
        - in: query
          name: userId
          required: false
          deprecated: true
          description: Optional legacy echo; when present it must match the active session identity.
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: "^[A-Za-z0-9._\\-]+$"
      responses:
        "200":
          description: budget snapshot returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EditorAssistBudgetResponse" }
        "400":
          description: missing, empty, or malformed query identifier
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: session cookie missing or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: optional tenantId/userId does not match the active session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/transform:
    post:
      summary: Start a product-mode transform from COBOL source text
      description: |
        Single entry point for product-mode transforms. Reference programs
        loaded via GET /api/v0/samples/{programId} are sent through this
        endpoint just like pasted source. If the request resolves to a
        registered reference program whose supportedInProductMode is false,
        the BFF returns 400 and never dispatches to the orchestrator.
      operationId: startTransform
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TransformInput" }
      responses:
        "201":
          description: started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TransformResponse" }
        "400":
          description: validation error or unsupported reference program
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: orchestrator rejected request — body carries a UI-safe failureCode
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UpstreamErrorResponse" }
        "503":
          description: orchestrator unavailable or not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/manual-compile-repair/diagnose:
    post:
      summary: Diagnose a manual repair candidate
      description: >
        Legacy compatibility route for the Studio manual diagnosis/repair
        lane. The BFF accepts compile-failure and runtime/parity-failure
        diagnosis payloads, preserves the Studio single-file and multi-file
        manual overlay shapes, and forwards backend-shape fields unchanged to
        the Orchestrator. The response body is also passed through verbatim so
        the broader diagnosis envelope can surface runtime/parity refs when the
        backend emits them.
      operationId: diagnoseManualCompileRepair
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualCompileRepairDiagnoseRequest" }
      responses:
        "200":
          description: diagnosis returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualCompileRepairDiagnoseResponse" }
        "400":
          description: validation error or malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: session cookie missing or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: orchestrator unavailable or not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/manual-compile-repair/apply:
    post:
      summary: Apply a manual repair proposal
      description: >
        Compatibility route for the Studio manual diagnosis/repair lane. The
        BFF forwards the request body unchanged apart from the Studio requester
        identity that it injects for auditability.
      operationId: applyManualCompileRepair
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualCompileRepairApplyRequest" }
      responses:
        "200":
          description: repair application returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualCompileRepairApplyResponse" }
        "400":
          description: validation error or malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: session cookie missing or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: orchestrator unavailable or not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/manual-compile-repair/reject:
    post:
      summary: Reject a manual repair proposal
      description: >
        Compatibility route for the Studio manual diagnosis/repair lane. The
        BFF forwards the proposal payload unchanged apart from the injected
        Studio requester identity used by the Orchestrator audit trail.
      operationId: rejectManualCompileRepair
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ManualCompileRepairRejectRequest" }
      responses:
        "200":
          description: rejection returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ManualCompileRepairRejectResponse" }
        "400":
          description: validation error or malformed request body
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: session cookie missing or expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: orchestrator unavailable or not configured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs:
    post:
      summary: Start a sample-backed standard or parity run through the Orchestrator
      description: >
        Starts a browser-visible run and delegates workflow authority to the
        Orchestrator. When `executionMode=parity`, the BFF forwards the
        curated trust-case and source/reference fields required by the
        Orchestrator parity contract. Diagnostic-fixture fallback is never
        used for parity runs; an unavailable Orchestrator returns 503.
      operationId: startRun
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunStartInput" }
      responses:
        "201":
          description: started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunSummary" }
        "400":
          description: validation error, unsupported execution mode, or invalid parity configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: orchestrator rejected request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: orchestrator unavailable for product-mode parity runs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}:
    get:
      summary: Get current state for a W0 run
      operationId: getRun
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunSummary" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/generated:
    get:
      summary: Return generated Java for side-by-side display
      description: >
        The response includes metadata only: `artifactRef` (the
        SHA-256-anchored reference to the generated-project manifest) and
        `traceability` (programId, irId, sourceHash). Java source content is
        intentionally not inlined here; callers must fetch file bytes through
        `/generated/files/{filePath}`, which enforces the artifact size limit.
        The same `artifactRef.sha256` appears as `generatedArtifactRef.sha256`
        on `/build-test` and `/evidence`, which is how Issue #97 guarantees
        the UI is showing the exact Java the build-test runner compiled and
        the Evidence Pack vouches for.
      operationId: getGenerated
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/generated/files:
    get:
      summary: List generated Java project files with per-file references
      description: >
        Returns the persisted generated-project file index for the run. Each
        entry includes path, sha256, byteSize, and mimeType so the UI (and any
        automation) can verify byte-for-byte what `/api/v0/runs/{runId}/generated/files/{encodedPath}`
        will return. The aggregate `artifactRef` is the SHA-256 of the
        manifest, identical to the one referenced by `/generated`,
        `/build-test`, and `/evidence`.
      operationId: getGeneratedFiles
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedFilesIndex" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/generated/files/{filePath}:
    get:
      summary: Return the content of a single generated Java project file
      description: >
        `filePath` is the relative path inside the generated project tree.
        Each path segment must be URL-encoded individually so directory
        separators are preserved (`src/main/java/c2c/CASE01.java` becomes
        `src/main/java/c2c/CASE01.java`). Path-traversal attempts (`..`,
        absolute paths, NUL bytes) return `400`. Unknown files inside the
        project tree return `404`.
      operationId: getGeneratedFile
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
        - in: path
          name: filePath
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GeneratedFileContent" }
        "400":
          description: invalid generated file path
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: file not found in generated project
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "413":
          description: |
            Issue #172. The requested artifact exceeds
            ``C2C_ARTIFACT_CONTENT_MAX_BYTES`` (defaults to 1 MiB). The BFF
            enforces the cap in three layers so an oversized upstream
            cannot pin the BFF process or the browser tab:
            1. The HTTP client rejects on declared ``content-length``
               larger than the cap before any body bytes are consumed.
            2. The HTTP client aborts the request as soon as the streamed
               body crosses the cap.
            3. The handler re-checks both the declared and measured
               byteSize after the envelope is parsed and never trusts the
               smaller of the two.
            The response carries ``byteSize`` (when known) and the active
            ``limit`` so the UI can render a meaningful diagnostic.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ArtifactTooLargeError" }
        "503":
          description: orchestrator unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/build-test:
    get:
      summary: Return build/test result for the run
      operationId: getBuildTest
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BuildTestView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/evidence:
    get:
      summary: Return Evidence Pack manifest reference and basic stats
      operationId: getEvidence
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EvidenceView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/events:
    get:
      summary: Return a lightweight event view for the run
      operationId: getRunEvents
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunEventsView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/progress:
    get:
      summary: Return the orchestrator step timeline for the run
      description: >
        Provides the browser-visible pipeline state for the active run:
        current step, completed steps, failed step diagnostics, per-step
        status, and the persisted progress artifact reference where available.
        The Studio uses this endpoint instead of deriving successful pipeline
        state from final build/test results.
      operationId: getRunProgress
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunProgressView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/learning:
    get:
      summary: Return raw Experience Learning summary for the run
      description: >
        Returns the live Experience Learning service summary when configured,
        otherwise falls back to the orchestrator-cached learning summary for
        the run. Diagnostic-fixture runs are explicitly incomplete because
        they are not observed by Experience Learning.
      operationId: getRunLearning
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunLearningView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/artifacts:
    get:
      summary: List persisted artifacts and metadata for the run
      description: >
        Proxies the orchestrator artifact index through browser-safe metadata.
        Each artifact entry includes sha256, byteSize, mimeType, kind,
        createdBy, createdAt, path, and name when available. Internal artifact
        locations, backend run IDs, and workflow IDs are not exposed through
        this browser-facing contract. Missing artifacts are reported as
        `missingArtifacts`; the BFF never fabricates a successful response.
      operationId: getRunArtifacts
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunArtifactsView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "502":
          description: orchestrator failure
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/workflow:
    get:
      summary: Return the W0.2 workflow contract product-level view
      description: >
        Issue #172. Surfaces the orchestrator-side W0.2 run contract
        (currentState, activeStep, agentAttemptCount, repairBudget,
        repairAttempts, finalClassification, failureCode/failureMessage,
        generatedJavaRef, buildTestResultRef, evidencePackRef) as a
        UI-safe envelope. Orchestrator failure codes are mapped onto the
        ``W02UiErrorCode`` enum. The raw modelInvocationRef, repairInputRef,
        and javaCandidateRef URIs are never returned; the response only
        reports boolean breadcrumbs.
      operationId: getRunWorkflow
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunWorkflowView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/traceability:
    get:
      summary: Per-run trust-pillar traceability envelope (Studio-IDE-6, #248)
      description: |
        Returns the deterministic generator's `c2c-trace.json` content, the
        semantic IR's symbol map (irNodeId → cobolFile + cobolLine), and the
        per-file Java region classification computed by the orchestrator.
        Missing components surface as `null` / empty objects (200 OK) so a
        run that has not reached `STATE_JAVA_CANDIDATE_PERSISTED` still
        serves a well-formed response.
      operationId: getRunTraceability
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Traceability envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TraceabilityEnvelope" }
        "404":
          description: Unknown run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/runs/{runId}/experience:
    get:
      summary: Return learning summary and policy for the run
      operationId: getRunExperience
      parameters:
        - in: path
          name: runId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunExperienceView" }
        "404":
          description: not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/model-gateway/health:
    get:
      summary: Report Model Gateway health and configuration
      operationId: getModelGatewayHealth
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelGatewayHealth" }
        "503":
          description: unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/model-gateway/models:
    get:
      summary: Return allowed models metadata
      operationId: getModelGatewayModels
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelGatewayModels" }
        "503":
          description: unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/v0/harness/ready:
    get:
      summary: Report Harness readiness
      operationId: getHarnessReady
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HarnessReady" }
        "503":
          description: unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status: { type: string, enum: [ok] }
        service: { type: string }

    ModeResponse:
      type: object
      required: [orchestrator, evidence]
      properties:
        orchestrator: { type: string, enum: [live, mock] }
        evidence: { type: string, enum: [live, mock] }

    SessionSignInRequest:
      description: >
        Optional identity overrides and reviewed Studio redaction
        additions for fixture / dev tooling. Omit identifiers to let
        the BFF mint opaque identifiers itself. Validation: each
        identifier matches `[A-Za-z0-9._-]{1,128}` and contains
        neither `@` nor whitespace (ADR-0005 §3).
      type: object
      additionalProperties: false
      properties:
        tenantId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._\\-]+$"
        userId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._\\-]+$"
        studioRedactionPatternAdditions:
          type: array
          maxItems: 25
          items:
            $ref: "#/components/schemas/StudioRedactionPatternAddition"

    StudioRedactionPatternAddition:
      type: object
      required: [id, literal]
      additionalProperties: false
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 96
          pattern: "^[A-Za-z0-9._:-]+$"
          description: Stable non-PII identifier for the tenant addition.
        literal:
          type: string
          minLength: 1
          maxLength: 256
          description: Literal token added to Studio pre-redaction for this session.

    SessionSignInResponse:
      type: object
      required: [tenantId, userId]
      additionalProperties: false
      properties:
        tenantId:
          type: string
          description: Opaque pseudonymous identifier (no PII).
        userId:
          type: string
          description: Opaque pseudonymous identifier (no PII).

    SessionBootstrapResponse:
      type: object
      required: [tenantId, userId, draftKeyWrappingSecret]
      additionalProperties: false
      properties:
        tenantId:
          type: string
          description: Opaque pseudonymous identifier (no PII).
        userId:
          type: string
          description: Opaque pseudonymous identifier (no PII).
        draftKeyWrappingSecret:
          type: string
          format: byte
          description: >
            Base64-encoded 32 random bytes, fresh per auth session.
            HKDF-SHA-256 input keying material for the AES-GCM draft
            encryption key (ADR-0005 §2). Studio MUST keep this in
            memory only — never logged, never re-sent, never written
            to local storage.
        studioRedactionPatternAdditions:
          type: array
          items:
            $ref: "#/components/schemas/StudioRedactionPatternAddition"
          description: >
            ADR-0005 §4 tenant additions that augment the bundled
            Studio redaction baseline for this auth session.

    Sample:
      description: |
        Reference program metadata exposed to the UI. The reference-program
        contract (Issue #94) is explicit: only entries with
        supportedInProductMode=true may be loaded and run through
        POST /api/v0/transform. Unsupported entries appear in listings as
        disabled so callers know they exist but cannot execute them.
      type: object
      required:
        - programId
        - title
        - knownDivergenceAtW0
        - supportedInProductMode
        - w0Subset
        - oracleMode
        - knownLimitations
      properties:
        programId: { type: string }
        title: { type: string }
        description: { type: string }
        knownDivergenceAtW0: { type: boolean }
        supportedInProductMode:
          type: boolean
          description: True iff this reference program can complete the real
            product path (parse → Semantic IR → Java generation → build/test →
            Evidence Pack) via POST /api/v0/transform.
        w0Subset:
          type: array
          description: COBOL verbs/constructs this reference program exercises
            within the W0 subset. Non-empty for supportedInProductMode=true.
          items: { type: string }
        oracleMode:
          description: How equivalence is proven for this program. Null only
            for unsupported entries.
          oneOf:
            - type: string
              enum: [cobol-runtime, synthetic-fixture]
            - type: "null"
        knownLimitations:
          type: array
          description: Documented W0 limitations for this program (empty if
            none known).
          items: { type: string }

    SampleDetail:
      allOf:
        - $ref: "#/components/schemas/Sample"
        - type: object
          required: [cobolSource, expectedOutput, cobolSourcePath, expectedOutputPath]
          properties:
            cobolSource: { type: string }
            expectedOutput: { type: string }
            cobolSourcePath: { type: string }
            expectedOutputPath: { type: string }

    AcceptanceArtifactReference:
      type: object
      required: [uri, path, sha256, byteSize]
      additionalProperties: false
      properties:
        uri: { type: string }
        path: { type: string }
        sha256:
          type: string
          pattern: "^[0-9a-fA-F]{64}$"
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        kind: { type: string }

    AcceptanceUnsupportedConstruct:
      type: object
      required: [code, construct]
      additionalProperties: false
      properties:
        code:
          type: string
          enum:
            - unsupported-feature
            - unsupported-data-declaration
            - unsupported-statement
            - unterminated-block
            - unmatched-block-end
            - mismatched-block-end
        construct: { type: string }
        line: { type: integer, minimum: 1 }
        message: { type: string }

    AcceptanceFixtureSummary:
      description: |
        W0.2 acceptance fixture summary (Issue #174). Lightweight view used
        by Studio to render the fixture catalog. Nullable fields
        (`description`, `oracleGenerationMode`, `expectedFailureCode`) are
        always serialised as JSON `null` rather than omitted, so clients
        can safely treat them as discriminators.
      type: object
      required:
        - fixtureId
        - title
        - description
        - oracleGenerationMode
        - supportedSubset
        - unsupportedConstructsCount
        - targetLanguage
        - expectedFinalClassification
        - expectedFailureCode
        - modes
      properties:
        fixtureId: { type: string }
        title: { type: string }
        description:
          oneOf:
            - type: string
            - type: "null"
        oracleGenerationMode:
          oneOf:
            - type: string
              enum: [cobol-runtime, static-fixture, user-provided]
            - type: "null"
        supportedSubset:
          type: array
          items: { type: string }
        unsupportedConstructsCount:
          type: integer
          minimum: 0
        targetLanguage:
          type: string
          enum: [java]
        expectedFinalClassification:
          type: string
          enum: [success, blocked]
        expectedFailureCode:
          oneOf:
            - type: string
              enum:
                - unsupported_cobol
                - parse_failed
                - semantic_ir_failed
                - java_generation_failed
                - java_compile_failed
                - java_runtime_failed
                - oracle_mismatch
                - evidence_incomplete
                - cancelled
            - type: "null"
        modes:
          type: array
          items:
            type: string
            enum: [file-backed, paste-mode]

    AcceptanceFixtureDetail:
      description: |
        Full acceptance-fixture payload returned by
        `GET /api/v0/acceptance-fixtures/{fixtureId}`. Contains every
        summary field plus the artifact references, the structured
        unsupported-construct list, the rationale, and the resolved
        on-disk content. Optional artifact references are serialised as
        JSON `null` rather than omitted.
      allOf:
        - $ref: "#/components/schemas/AcceptanceFixtureSummary"
        - type: object
          required:
            - sourceCobolArtifactRef
            - expectedOutputArtifactRef
            - unsupportedConstructs
            - rationale
            - cobolSource
            - expectedOutput
          properties:
            sourceCobolArtifactRef: { $ref: "#/components/schemas/AcceptanceArtifactReference" }
            expectedOutputArtifactRef:
              oneOf:
                - $ref: "#/components/schemas/AcceptanceArtifactReference"
                - type: "null"
            unsupportedConstructs:
              type: array
              items: { $ref: "#/components/schemas/AcceptanceUnsupportedConstruct" }
            rationale: { type: string }
            cobolSource: { type: string }
            expectedOutput:
              oneOf:
                - type: string
                - type: "null"

    RunStartInput:
      type: object
      required: [programId]
      description: >
        Starts a standard run by default. Supplying `executionMode=parity` or
        any source/reference field starts an Orchestrator-owned parity run.
      properties:
        programId: { type: string }
        requester: { type: string }
        executionMode:
          type: string
          enum: [standard, parity]
          default: standard
        trustCaseId:
          type: string
          description: Optional curated trust-case identifier for parity runs.
        sourceReferenceFixtureId:
          type: string
          description: Required for parity runs; forwarded to the Orchestrator.
        sourceReferenceMode:
          type: string
          enum: [reference-fixture, native-cobol]
          default: reference-fixture
          description: Controlled source/reference execution mode for parity runs.

    TransformInput:
      type: object
      required: [sourceText]
      properties:
        sourceText: { type: string }
        programId: { type: string }
        sourceName: { type: string }
        # Issue #172: W0.2 transform contract. ``targetLanguage`` defaults
        # to ``java`` and is the only supported value for W0.2; anything
        # else is rejected with 400. ``expectedOutput`` (golden master) and
        # ``oracleInput`` (oracle stdin) are forwarded onto the orchestrator
        # inputRef so the build/test runner and verification/repair agent
        # can compare against the exact bytes the user supplied. Empty
        # strings are treated as "not supplied" and fall back to the
        # deterministic W0/W0.1 oracle path.
        targetLanguage:
          type: string
          enum: [java]
          default: java
        expectedOutput: { type: string }
        oracleInput: { type: string }
        useTransformationAgent:
          type: boolean
          default: true
        options:
          type: object
          additionalProperties: true

    ManualCompileRepairJavaFile:
      type: object
      required: [path, content]
      properties:
        path: { type: string }
        content: { type: string }

    ManualCompileRepairOverlayInput:
      type: object
      description: >
        Opaque manual-edit overlay envelope accepted by the diagnosis route.
        The BFF only inspects the optional `regions` array when it needs to
        flatten multi-file overlays for the legacy `manualOverlay` shim and
        forwards the rest unchanged.
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        runId: { type: string }
        javaFile: { type: string }
        regions:
          type: array
          items:
            type: object
            required: [filePath, originClass, startLine, endLine]
            properties:
              filePath: { type: string }
              originClass:
                type: string
                enum:
                  [
                    deterministic,
                    agent_proposed,
                    repair_attempted,
                    manual_modified,
                    manual_edit,
                  ]
              startLine: { type: integer, minimum: 1 }
              endLine: { type: integer, minimum: 1 }
              startColumn: { type: integer, minimum: 1 }
              endColumn: { type: integer, minimum: 1 }
      additionalProperties: true

    ManualCompileRepairDiagnoseRequest:
      type: object
      required: [runId, entryFilePath, javaFiles]
      description: >
        Studio manual diagnosis request for compile, runtime, and parity
        repair flows. `buildTestContext` carries the bounded verification
        evidence from the current manual Java snapshot so runtime/parity
        diagnosis can stay attached to the exact edited files the developer
        just verified.
      properties:
        runId: { type: string }
        entryClass: { type: string }
        entryFilePath: { type: string }
        javaFiles:
          type: array
          items: { $ref: "#/components/schemas/ManualCompileRepairJavaFile" }
        manualEditOverlay:
          oneOf:
            - $ref: "#/components/schemas/ManualCompileRepairOverlayInput"
            - type: "null"
        manualEditOverlays:
          type: array
          items: { $ref: "#/components/schemas/ManualCompileRepairOverlayInput" }
        buildTestContext:
          type: object
          additionalProperties: false
          properties:
            status:
              type: string
            classification:
              type: string
            compileStatus:
              type: string
            executionStatus:
              type: string
            comparisonPolicy:
              type: string
            expectedOutput:
              type: string
            outputRef:
              oneOf:
                - $ref: "#/components/schemas/OutputRef"
                - type: "null"
            expectedOutputRef:
              oneOf:
                - $ref: "#/components/schemas/OutputRef"
                - type: "null"
            actualOutputRef:
              oneOf:
                - $ref: "#/components/schemas/OutputRef"
                - type: "null"
            comparison:
              type: object
              additionalProperties: false
              properties:
                matched:
                  type: boolean
                status:
                  type: string
                comparisonPolicyVersion:
                  type: string
                mismatchClassification:
                  type: string
                diffSummary:
                  type: string
                comparisonPolicyRef:
                  oneOf:
                    - $ref: "#/components/schemas/OutputRef"
                    - type: "null"
                comparisonResultRef:
                  oneOf:
                    - $ref: "#/components/schemas/OutputRef"
                    - type: "null"
                diffRef:
                  oneOf:
                    - $ref: "#/components/schemas/OutputRef"
                    - type: "null"
                expectedRef:
                  oneOf:
                    - $ref: "#/components/schemas/OutputRef"
                    - type: "null"
                actualRef:
                  oneOf:
                    - $ref: "#/components/schemas/OutputRef"
                    - type: "null"
      additionalProperties: true

    ManualCompileRepairDiagnosis:
      type: object
      required: [diagnosisId, runId, failureClass, scopeClass, likelyRootCause, confidence, evidenceRefs, createdAt]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
          default: v0
        diagnosisId: { type: string }
        runId: { type: string }
        workflowId: { type: string }
        buildResultRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"
        executionResultRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"
        comparisonResultRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"
        sourceRevisionRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"
        currentHeadRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"
        failureClass:
          type: string
          enum:
            [
              build_failure,
              runtime_failure,
              comparison_mismatch,
              policy_block,
              fixture_issue,
              generated_code_defect,
              manual_edit_issue,
              out_of_scope,
              unknown,
            ]
        scopeClass:
          type: string
          enum: [manual_edit, generated_code, fixture_reference, out_of_scope, unknown]
        likelyRootCause: { type: string }
        summary: { type: string }
        confidence:
          type: object
          required: [level]
          properties:
            level:
              type: string
              enum: [low, medium, high]
            basis: { type: string }
        recommendedNextAction:
          type: string
          enum: [repair_generated_code, repair_fixture, retry_build, escalate, stop]
        evidenceRefs:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/OutputRef"
              - type: "null"
        createdAt: { type: string }
      additionalProperties: true

    ManualCompileRepairProposal:
      type: object
      required: [proposalId, runId, patchSha256, applicationState, approvalState, files, sourceRevisionRef, currentHeadRef, evidenceRefs, createdAt]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
          default: v0
        proposalId: { type: string }
        runId: { type: string }
        workflowId: { type: string }
        diagnosisId: { type: string }
        proposedBy: { type: string }
        patchSha256: { type: string }
        summary: { type: string }
        applicationState:
          type: string
          enum: [draft, review_pending, applied, rejected]
        approvalState:
          type: string
          enum: [pending, approved, rejected]
        files:
          type: array
          items:
            type: object
            required: [path, changeType]
            properties:
              path: { type: string }
              changeType:
                type: string
                enum: [add, modify, delete]
              beforeSha256: { type: string }
              afterSha256: { type: string }
              diff: { type: string }
        sourceRevisionRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"
        currentHeadRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"
        evidenceRefs:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/OutputRef"
              - type: "null"
        developerApproval:
          type: object
          properties:
            approvedBy: { type: string }
            approvedAt: { type: string }
            approvedPatchSha256: { type: string }
        approvedAt: { type: string }
        appliedAt: { type: string }
      additionalProperties: true

    ManualCompileRepairCandidateProject:
      type: object
      required: [entryClass, entryFilePath, files]
      properties:
        entryClass: { type: string }
        entryFilePath: { type: string }
        files:
          type: object
          additionalProperties:
            type: string

    ManualCompileRepairDiagnoseResponse:
      type: object
      required: [schemaVersion, runId, diagnosis, candidateProject, buildTest]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        runId: { type: string }
        diagnosis:
          $ref: "#/components/schemas/ManualCompileRepairDiagnosis"
        proposal:
          oneOf:
            - $ref: "#/components/schemas/ManualCompileRepairProposal"
            - type: "null"
        candidateProject:
          $ref: "#/components/schemas/ManualCompileRepairCandidateProject"
        buildTest:
          $ref: "#/components/schemas/BuildTestView"
      additionalProperties: true

    ManualCompileRepairApplyRequest:
      type: object
      required: [runId, entryFilePath, javaFiles, proposal, candidateProject]
      properties:
        runId: { type: string }
        entryClass: { type: string }
        entryFilePath: { type: string }
        javaFiles:
          type: array
          items: { $ref: "#/components/schemas/ManualCompileRepairJavaFile" }
        proposal:
          $ref: "#/components/schemas/ManualCompileRepairProposal"
        candidateProject:
          $ref: "#/components/schemas/ManualCompileRepairCandidateProject"
        expectedOutput: { type: string }
        oracleInput: { type: string }
      additionalProperties: true

    ManualCompileRepairApplyResponse:
      type: object
      required: [schemaVersion, runId, proposal, candidateProject, buildTest]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        runId: { type: string }
        proposal:
          $ref: "#/components/schemas/ManualCompileRepairProposal"
        candidateProject:
          $ref: "#/components/schemas/ManualCompileRepairCandidateProject"
        buildTest:
          $ref: "#/components/schemas/BuildTestView"
      additionalProperties: true

    ManualCompileRepairRejectRequest:
      type: object
      required: [runId, proposal]
      properties:
        runId: { type: string }
        proposal:
          $ref: "#/components/schemas/ManualCompileRepairProposal"
      additionalProperties: true

    ManualCompileRepairRejectResponse:
      type: object
      required: [schemaVersion, runId, proposal]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        runId: { type: string }
        proposal:
          $ref: "#/components/schemas/ManualCompileRepairProposal"
      additionalProperties: true

    RunSummary:
      type: object
      description: >
        Run envelope published by the BFF. Governed by ADR 0006
        (Studio-BFF Contract Versioning). New optional fields may be
        added without a ``schemaVersion`` bump per the additive-only
        rule; removal of an existing field requires a deprecation
        period of at least one minor wave.
      required:
        - runId
        - programId
        - status
        - mode
        - createdAt
        - activeStep
        - agentAttemptCount
        - repairBudget
        - assistBudget
        - modelInvocationBudget
        - finalClassification
        - failureCode
        - failureMessage
      properties:
        schemaVersion:
          type: string
          enum: [v0]
          default: v0
          description: >
            DTO version per ADR 0006. Optional on the wire; absence
            means "v0".
        runId: { type: string }
        programId: { type: string }
        executionMode:
          type: string
          enum: [standard, parity]
        trustCaseId: { type: string }
        sourceReferenceFixtureId: { type: string }
        sourceReferenceMode:
          type: string
          enum: [reference-fixture, native-cobol, ""]
        status:
          type: string
          enum: [starting, updating, completed, failed]
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        message: { type: string }
        evidenceRefs:
          type: array
          items: { type: string }
        policyDecision: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        # Issue #172: W0.2 contract surface. Fields are always present so
        # the UI can render a stable shape; they default to ``null`` /
        # ``0`` when the orchestrator has not yet produced a workflow
        # contract for the run.
        activeStep:
          oneOf:
            - type: string
            - type: 'null'
        agentAttemptCount: { type: integer, minimum: 0 }
        repairBudget:
          oneOf:
            - $ref: "#/components/schemas/RepairBudget"
            - type: 'null'
        # Issue #216 (W0.3-5): assist + Model Gateway budgets on the
        # summary endpoint so listing views can render budget pressure.
        assistBudget:
          oneOf:
            - $ref: "#/components/schemas/AssistBudget"
            - type: 'null'
        modelInvocationBudget:
          oneOf:
            - $ref: "#/components/schemas/ModelInvocationBudget"
            - type: 'null'
        finalClassification:
          oneOf:
            - type: string
              enum: [success, blocked, failed, cancelled, incomplete]
            - type: 'null'
        failureCode:
          oneOf:
            - $ref: "#/components/schemas/W02UiErrorCode"
            - type: 'null'
        failureMessage:
          oneOf:
            - type: string
            - type: 'null'
        javaRegionClassification:
          description: >
            Optional per-file trust-pillar region map used by
            Studio-IDE-13 to colour generated-Java buffers. Absent
            for runs older than W0.3 or for runs where overlay
            computation was skipped. Studio renders no decoration
            when absent per ADR 0006 Decision 4.
          oneOf:
            - $ref: "#/components/schemas/JavaRegionClassificationMap"
            - type: 'null'

    JavaOriginOverlay:
      type: object
      description: >
        Region-granular provenance overlay for a generated Java file.
        Originally defined inline in
        ``apps/c2c-studio/src/types/api.ts`` (Studio-ADR-4 / #257);
        promoted to the BFF wire surface so the contract is reviewable
        on both sides. Governed by ADR 0006.
      required: [schemaVersion, runId, javaFile, regions]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
        runId: { type: string }
        javaFile: { type: string }
        regions:
          type: array
          items:
            type: object
            required: [lineRange, originClass]
            properties:
              lineRange:
                type: object
                required: [startLine, endLine]
                properties:
                  startLine: { type: integer, minimum: 1 }
                  endLine: { type: integer, minimum: 1 }
              originClass:
                type: string
                enum:
                  - deterministic
                  - agent_proposed
                  - repair_attempted
                  - manual_modified
                  - manual_edit

    RunLinks:
      type: object
      required: [self, generated, generatedFiles, buildTest, evidence, events, progress, artifacts, learning, experience, workflow]
      properties:
        self: { type: string }
        generated: { type: string }
        generatedFiles: { type: string }
        buildTest: { type: string }
        evidence: { type: string }
        events: { type: string }
        progress: { type: string }
        artifacts: { type: string }
        learning: { type: string }
        experience: { type: string }
        workflow: { type: string }

    W02UiErrorCode:
      type: string
      description: >
        Closed set of user-safe failure codes the BFF exposes to the
        browser. Orchestrator codes outside this set collapse to
        ``internal_error``; upstream connectivity issues map to
        ``service_unavailable``.
      enum:
        - unsupported_cobol
        - parse_failed
        - semantic_ir_failed
        - model_gateway_unavailable
        - model_policy_denied
        - agent_timeout
        - agent_contract_invalid
        - java_generation_failed
        - java_compile_failed
        - java_runtime_failed
        - oracle_mismatch
        - evidence_incomplete
        - cancelled
        - service_unavailable
        - internal_error

    RepairBudget:
      type: object
      required: [limit, used, remaining]
      properties:
        limit: { type: integer, minimum: 1, maximum: 3 }
        used: { type: integer, minimum: 0 }
        remaining: { type: integer, minimum: 0 }

    # Issue #216 (W0.3-5): per-run productive-assist activation budget.
    # Same {limit, used, remaining} shape as the repair budget; range
    # mirrors the W0.3 cap [1, 3].
    AssistBudget:
      type: object
      required: [limit, used, remaining]
      properties:
        limit: { type: integer, minimum: 1, maximum: 3 }
        used: { type: integer, minimum: 0 }
        remaining: { type: integer, minimum: 0 }

    # Issue #216 (W0.3-5): per-run Model Gateway invocation budget. Covers
    # one transformation call + up to three repair-iteration calls plus
    # headroom; the contract clamps the upper bound to 20 so future waves
    # can introduce additional bounded productive steps without contract
    # surgery.
    ModelInvocationBudget:
      type: object
      required: [limit, used, remaining]
      properties:
        limit: { type: integer, minimum: 1, maximum: 20 }
        used: { type: integer, minimum: 0 }
        remaining: { type: integer, minimum: 0 }

    EditorAssistBudget:
      description: >
        ADR 0004 editor-assist budget. Scoped to the BFF-derived
        `(tenantId, userId, authSessionId)` identity with an additional
        BFF-enforced per-tenant-per-day cap.
      type: object
      required: [limit, used, remaining]
      additionalProperties: false
      properties:
        limit: { type: integer, minimum: 1, maximum: 10, default: 3 }
        used: { type: integer, minimum: 0 }
        remaining: { type: integer, minimum: 0 }

    EditorRegionSourceKind:
      type: string
      enum: [cobol, java]

    EditorRegion:
      type: object
      required: [filePath, sourceKind, startLine, endLine]
      additionalProperties: false
      properties:
        filePath:
          type: string
          minLength: 1
          maxLength: 512
          description: Workspace-relative editor file path for the selected region; absolute paths, drive prefixes, and parent-directory traversal are rejected.
        sourceKind: { $ref: "#/components/schemas/EditorRegionSourceKind" }
        startLine: { type: integer, minimum: 1 }
        endLine: { type: integer, minimum: 1 }

    StudioRedactionMetadata:
      type: object
      required: [studioRedactionProfileVersion, matchedPatternIds]
      additionalProperties: false
      properties:
        studioRedactionProfileVersion: { type: string, minLength: 1 }
        matchedPatternIds:
          type: array
          items:
            type: string
            pattern: "^[A-Za-z][A-Za-z0-9_:-]{0,127}$"

    EditorExplainRequest:
      type: object
      required:
        - schemaVersion
        - sessionId
        - sourceHash
        - region
        - redactedBytes
        - byteHash
        - studioRedactionMetadata
      additionalProperties: false
      properties:
        schemaVersion: { type: string, enum: ["v0"] }
        sessionId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._\\-]+$"
        tenantId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._\\-]+$"
          deprecated: true
          description: Optional legacy echo; when present it must match the active `c2c.sid` session identity. The BFF never trusts this value for budget or ledger attribution.
        userId:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._\\-]+$"
          deprecated: true
          description: Optional legacy echo; when present it must match the active `c2c.sid` session identity. The BFF never trusts this value for budget or ledger attribution.
        runId:
          oneOf:
            - type: string
              minLength: 1
              maxLength: 128
              pattern: "^[A-Za-z0-9._\\-]+$"
            - type: "null"
        sourceHash:
          type: string
          pattern: "^[A-Fa-f0-9]{64}$"
        region: { $ref: "#/components/schemas/EditorRegion" }
        redactedBytes:
          type: string
          minLength: 1
          maxLength: 200000
          description: Studio-pre-redacted selected region bytes.
        byteHash:
          type: string
          pattern: "^[A-Fa-f0-9]{64}$"
          description: SHA-256 hex digest over `redactedBytes`.
        studioRedactionMetadata:
          $ref: "#/components/schemas/StudioRedactionMetadata"

    EditorExplainResponse:
      type: object
      required:
        - schemaVersion
        - explanation
        - modelInvocationRef
        - editorAssistRef
        - ledgerRef
        - budgetSnapshot
        - redactionApplied
      additionalProperties: false
      properties:
        schemaVersion: { type: string, enum: ["v0"] }
        explanation: { type: string, minLength: 1 }
        modelInvocationRef: { type: string, minLength: 1 }
        editorAssistRef: { type: string, minLength: 1 }
        ledgerRef: { type: string, minLength: 1 }
        budgetSnapshot: { $ref: "#/components/schemas/EditorAssistBudget" }
        redactionApplied:
          type: array
          items:
            type: string
            pattern: "^[A-Za-z][A-Za-z0-9_:-]{0,127}$"

    EditorExplainErrorCode:
      type: string
      enum:
        - budget_exhausted
        - policy_denied
        - gateway_unavailable
        - timeout
        - invalid_region

    EditorExplainErrorResponse:
      type: object
      required: [schemaVersion, errorCode, message, budgetSnapshot]
      additionalProperties: false
      properties:
        schemaVersion: { type: string, enum: ["v0"] }
        errorCode: { $ref: "#/components/schemas/EditorExplainErrorCode" }
        message: { type: string }
        budgetSnapshot:
          oneOf:
            - { $ref: "#/components/schemas/EditorAssistBudget" }
            - type: "null"

    EditorAssistBudgetResponse:
      type: object
      required: [schemaVersion, budget]
      additionalProperties: false
      properties:
        schemaVersion: { type: string, enum: ["v0"] }
        budget: { $ref: "#/components/schemas/EditorAssistBudget" }

    RepairAttemptSummary:
      type: object
      required: [attemptNumber, repairDecision, failureCategory, hasModelInvocation, hasRepairInput, hasJavaCandidate]
      properties:
        attemptNumber: { type: integer, minimum: 1 }
        repairDecision:
          type: string
          enum: [propose_candidate, refuse, escalate, no_change]
        failureCategory:
          oneOf:
            - type: string
            - type: 'null'
        # Boolean breadcrumbs replace the raw orchestrator refs so the
        # browser can show "model was invoked" / "candidate produced"
        # without exposing internal artifact URIs.
        hasModelInvocation: { type: boolean }
        hasRepairInput: { type: boolean }
        hasJavaCandidate: { type: boolean }
        rationale: { type: string }

    WorkflowArtifactRef:
      type: object
      required: [sha256, byteSize, kind]
      properties:
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        kind: { type: string }

    RunWorkflowView:
      type: object
      required:
        - runId
        - programId
        - mode
        - productMode
        - source
        - state
        - activeStep
        - activeAgent
        - agentAttemptCount
        - repairBudget
        - assistBudget
        - modelInvocationBudget
        - repairAttempts
        - assistDecision
        - finalClassification
        - failureCode
        - failureMessage
        - generatedJavaRef
        - buildTestResultRef
        - evidencePackRef
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        source: { type: string, enum: [live, cached, unavailable] }
        state:
          oneOf:
            - type: string
            - type: 'null'
        activeStep:
          oneOf:
            - type: string
            - type: 'null'
        activeAgent:
          oneOf:
            - type: string
              enum:
                - transformation_agent
                - verification_repair_agent
                - cobol_parser
                - semantic_ir
                - java_generator
                - build_test_runner
                - evidence_service
            - type: 'null'
        agentAttemptCount: { type: integer, minimum: 0 }
        repairBudget:
          oneOf:
            - $ref: "#/components/schemas/RepairBudget"
            - type: 'null'
        # Issue #216 (W0.3-5): per-run assist + Model Gateway budgets.
        # ``null`` until the orchestrator has produced a contract for the
        # run (e.g. diagnostic-fixture runs).
        assistBudget:
          oneOf:
            - $ref: "#/components/schemas/AssistBudget"
            - type: 'null'
        modelInvocationBudget:
          oneOf:
            - $ref: "#/components/schemas/ModelInvocationBudget"
            - type: 'null'
        repairAttempts:
          type: array
          items: { $ref: "#/components/schemas/RepairAttemptSummary" }
        assistDecision:
          # W0.3 (#214): explicit Orchestrator-owned assist-decision gate.
          # ``null`` while the run has not yet reached the gate. The closed
          # set of outcomes and reason codes is owned by the orchestrator;
          # the BFF drops any unknown value so the UI never renders an
          # unrecognised reason.
          oneOf:
            - $ref: "#/components/schemas/AssistDecisionSummary"
            - type: 'null'
        finalClassification:
          oneOf:
            - type: string
              enum: [success, blocked, failed, cancelled, incomplete]
            - type: 'null'
        failureCode:
          oneOf:
            - $ref: "#/components/schemas/W02UiErrorCode"
            - type: 'null'
        failureMessage:
          oneOf:
            - type: string
            - type: 'null'
        generatedJavaRef:
          oneOf:
            - $ref: "#/components/schemas/WorkflowArtifactRef"
            - type: 'null'
        buildTestResultRef:
          oneOf:
            - $ref: "#/components/schemas/WorkflowArtifactRef"
            - type: 'null'
        evidencePackRef:
          oneOf:
            - $ref: "#/components/schemas/WorkflowArtifactRef"
            - type: 'null'

    AssistDecisionSummary:
      type: object
      required:
        - outcome
        - reasonCode
        - decidedAt
        - selectedAgentRole
        - affectedArtifactRefs
        - repairBudgetSnapshot
        - assistBudgetSnapshot
        - modelInvocationBudgetSnapshot
        - rationale
      properties:
        outcome:
          type: string
          enum: [assist_required, assist_not_required]
        reasonCode:
          type: string
          # Deterministic uncertainty reason codes (Issue #215) followed by
          # caller-driven baseline codes (Issue #214) and the W0.3-5
          # hard-termination signal (Issue #216): the caller opted in but
          # the per-run assist budget is exhausted. Consumers MUST drop
          # any value outside this set rather than rendering it.
          enum:
            - semantic_ir_bounded_ambiguity
            - translation_unsupported_repairable
            - baseline_open_assumptions
            - deterministic_candidate_low_confidence
            - caller_explicit_opt_in
            - caller_did_not_opt_in
            - assist_budget_exhausted
        decidedAt:
          type: string
          description: ISO-8601 UTC timestamp.
        selectedAgentRole:
          oneOf:
            - type: string
              enum: [transformation_agent]
            - type: 'null'
        affectedArtifactRefs:
          type: array
          items:
            type: object
            properties:
              sha256: { type: string }
              byteSize: { type: integer, minimum: 0 }
              kind: { type: string }
              path: { type: string }
        repairBudgetSnapshot:
          oneOf:
            - $ref: "#/components/schemas/RepairBudget"
            - type: 'null'
        # Issue #216 (W0.3-5): assist + Model Gateway budget snapshots
        # captured at gate time so consumers can audit the budget state
        # the orchestrator observed when the assist decision was made.
        assistBudgetSnapshot:
          oneOf:
            - $ref: "#/components/schemas/AssistBudget"
            - type: 'null'
        modelInvocationBudgetSnapshot:
          oneOf:
            - $ref: "#/components/schemas/ModelInvocationBudget"
            - type: 'null'
        rationale:
          oneOf:
            - type: string
            - type: 'null'

    ArtifactTooLargeError:
      type: object
      required: [error, limit]
      properties:
        error: { type: string, enum: [artifact_too_large] }
        path: { type: string }
        # Optional because the streaming-cap path can abort before the
        # upstream byteSize is observable (no content-length header and
        # the response was cut off mid-stream).
        byteSize: { type: integer, minimum: 0 }
        limit: { type: integer, minimum: 1 }

    UpstreamErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        failureCode: { $ref: "#/components/schemas/W02UiErrorCode" }

    TransformResponse:
      type: object
      required: [runId, orchestratorRunId, status, programId, productMode, links, createdAt, mode]
      properties:
        runId: { type: string }
        orchestratorRunId: { type: string }
        programId: { type: string }
        status:
          type: string
          enum: [starting, updating, completed, failed]
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        message: { type: string }
        evidenceRefs:
          type: array
          items: { type: string }
        policyDecision: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        links:
          $ref: "#/components/schemas/RunLinks"

    GeneratedView:
      type: object
      required: [runId, programId, mode, status]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status:
          type: string
          enum: [generated, unsupported, skipped, incomplete]
        entryClass: { type: string }
        entryFilePath: { type: string }
        fileCount: { type: integer, minimum: 0 }
        files:
          type: object
          deprecated: true
          description: Always empty. Generated source content is served only
            by `/generated/files/{filePath}` so the BFF can enforce the
            artifact-content size cap.
          additionalProperties: false
        fileRefs:
          type: array
          items: { $ref: "#/components/schemas/GeneratedFileRef" }
        unsupportedFeatures:
          type: array
          items: { type: string }
        openAssumptions:
          type: array
          items: { type: string }
        missingArtifacts:
          type: array
          items: { type: string }
        orchestratorRunId: { type: string }
        generationResponseRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        artifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: >
            Reference to the generated-project manifest. The same sha256 is
            reported by /build-test (`generatedArtifactRef`) and /evidence
            (`generatedArtifactRef`), enforcing the Issue #97 consistency
            requirement.
        traceability:
          $ref: "#/components/schemas/GeneratedTraceability"
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
        note: { type: string }

    GeneratedFileRef:
      type: object
      required: [path]
      properties:
        path: { type: string }
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        kind: { type: string }
        name: { type: string }

    GeneratedTraceability:
      type: object
      description: >
        Lineage triple emitted alongside generated Java. Governed by
        ADR 0006 (Studio-BFF Contract Versioning). When the BFF cannot
        emit lineage for a run, the entire object is omitted from
        ``GeneratedView`` rather than null-stuffed; Studio renders the
        "Lineage unavailable" state per ADR 0006 Decision 4.
      required: [programId, irId, sourceHash]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
          default: v0
          description: >
            DTO version per ADR 0006. Optional on the wire; absence
            means "v0". Bumped only on a non-additive change.
        programId: { type: string }
        irId: { type: string }
        sourceHash: { type: string }

    OutputRef:
      type: object
      required: [sha256]
      properties:
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        kind: { type: string }
        path: { type: string }
        name: { type: string }
        mimeType: { type: string }
        createdBy: { type: string }
        createdAt: { type: string }

    Diagnostic:
      type: object
      description: >
        BFF-shaped diagnostic record consumed by the Studio Problems
        panel and editor markers. Governed by ADR 0006 (Studio-BFF
        Contract Versioning). Positional fields and ``artifactRef``
        are optional; Studio fallback rules for missing fields are
        enumerated in ADR 0006 Decision 4.
      required: [severity, code, message]
      properties:
        schemaVersion:
          type: string
          enum: [v0]
          default: v0
          description: >
            DTO version per ADR 0006. Optional on the wire; absence
            means "v0". Bumped only on a non-additive change such as
            removal of a field or tightening of an enum.
        severity: { type: string, enum: [error, warning, info, hint] }
        code: { type: string }
        message: { type: string }
        line: { type: [integer, "null"], minimum: 1 }
        column: { type: [integer, "null"], minimum: 1 }
        endLine: { type: [integer, "null"], minimum: 1 }
        endColumn: { type: [integer, "null"], minimum: 1 }
        filePath: { type: [string, "null"] }
        sourceKind:
          type: [string, "null"]
          enum: [cobol, ir, generated_java, build, test, null]
        originStep: { type: [string, "null"] }
        artifactRef:
          description: >
            Optional reference to the artifact this diagnostic
            attaches to (e.g. semantic-IR node id, generated-Java
            file). Populated by Studio-IDE-5 (#244) and Studio-IDE-6
            (#248); absent on diagnostics produced by older steps or
            replayed from v0 Evidence-Pack fixtures.
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: "null"

    GeneratedFilesIndex:
      type: object
      required: [runId, programId, mode, status, files, fileCount]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status: { type: string, enum: [complete, incomplete] }
        files:
          type: array
          items: { $ref: "#/components/schemas/GeneratedFileRef" }
        fileCount: { type: integer, minimum: 0 }
        entryFilePath: { type: string }
        artifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        missingArtifacts:
          type: array
          items: { type: string }
        orchestratorRunId: { type: string }
        note: { type: string }

    GeneratedFileContent:
      type: object
      required: [runId, path, content, sha256, byteSize, mimeType]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        path: { type: string }
        content: { type: string }
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        kind: { type: string }
        orchestratorRunId: { type: string }

    BuildTestView:
      type: object
      required: [runId, programId, mode, status, classification]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status:
          type: string
          enum:
            [
              ok,
              compile-failed,
              run-failed,
              output-divergence,
              golden-master-reproduction-failed,
              missing-golden-master,
              skipped,
              incomplete,
            ]
        classification:
          type: string
          enum:
            [
              match,
              divergence-known-w0-coverage-gap,
              divergence-unknown,
              true-golden-master-reproduction-error,
              true-golden-master-mismatch,
              compile-error,
              run-error,
              skipped-no-execution,
            ]
        expectedOutput: { type: string }
        actualOutput: { type: string }
        comparison:
          oneOf:
            - $ref: "#/components/schemas/ParityComparisonView"
            - type: 'null'
        diffSummary:
          type: string
          maxLength: 4050
        outputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        expectedOutputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: Hash-only reference to the oracle or expected-output bytes used for comparison.
        actualOutputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: Hash-only reference to the generated Java stdout bytes used for comparison.
        generatedArtifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: >
            Issue #97 consistency anchor — sha256 of the generated-project
            manifest that the runner compiled. Equal to the same field on
            /generated and /evidence.
        diagnostics:
          type: array
          items: { $ref: "#/components/schemas/Diagnostic" }
        note: { type: string }

    ParityComparisonView:
      type: object
      description: >
        Browser-safe projection of the deterministic parity comparison emitted
        by the Orchestrator/build-test path. Artifact references are hash-only
        BFF OutputRef values; raw URIs and unbounded diff payloads are not
        exposed.
      properties:
        matched: { type: boolean }
        status:
          type: string
          enum: [passed, failed, blocked]
        comparisonPolicyVersion: { type: string }
        mismatchClassification:
          type: string
          enum:
            [
              none,
              content,
              formatting,
              line_endings,
              stderr,
              exit_code,
              runtime_failure,
              unsupported_input,
              policy,
              unknown,
            ]
        diffSummary:
          type: string
          maxLength: 4050
        comparisonPolicyRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        comparisonResultRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        diffRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        expectedRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        actualRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        sourceOutputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        javaOutputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        sourceNormalizedOutputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        javaNormalizedOutputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        normalizedDiffRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'

    EvidenceView:
      type: object
      required: [runId, programId, mode, status]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status:
          type: string
          enum: [complete, incomplete, invalid]
        packId: { type: string }
        manifestHash: { type: string }
        validationStatus: { type: string, enum: [valid, invalid, incomplete, unknown] }
        missingArtifacts:
          type: array
          items: { type: string }
        orchestratorRunId: { type: string }
        artifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        exportRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        generatedArtifactRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
          description: >
            Issue #97 consistency anchor — same sha256 as
            BuildTestView.generatedArtifactRef and GeneratedView.artifactRef.
        # ADR 0007 (#257, #279) — Manual-edit provenance run-summary
        # signals mirrored from the orchestrator's W02RunContract, plus
        # the persisted overlay reference so the Studio can fetch the
        # per-region overlay JSON for audit review. Defaults are
        # false / 0 / null per ADR 0006 §2 absence semantics.
        manualEditsCarriedOver:
          type: boolean
          description: >
            True iff the verified Java buffer contained at least one
            ``manual_modified`` or ``manual_edit`` region. Mirrors
            ``EvidencePackManifest.manualEditsCarriedOver``.
        manualDriftRegionCount:
          type: integer
          minimum: 0
          description: >
            Number of regions whose ``originClass`` is ``manual_modified``
            or ``manual_edit``. Mirrors
            ``EvidencePackManifest.manualDriftRegionCount``.
        manualEditOverlay:
          oneOf:
            - $ref: "#/components/schemas/ManualEditOverlayView"
            - type: 'null'
          description: >
            Reference to the persisted per-region manual-edit overlay
            artifact. Present iff ``manualEditsCarriedOver`` is true.
        note: { type: string }

    ManualEditOverlayView:
      type: object
      required: [uri, sha256, regionCount]
      description: >
        BFF projection of the evidence-pack ``artifacts.manualEditOverlay``
        reference (ADR 0007 §3). The Studio dereferences ``uri`` to fetch
        the overlay JSON for audit review; ``regionCount`` mirrors
        EvidenceView.manualDriftRegionCount.
      properties:
        uri: { type: string }
        sha256: { type: string, pattern: "^[0-9a-fA-F]{64}$" }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        kind: { type: string }
        schemaVersion: { type: string, enum: [v0] }
        regionCount:
          type: integer
          minimum: 1
          description: >
            Number of regions enumerated in the referenced overlay. MUST
            equal EvidenceView.manualDriftRegionCount.

    RunArtifactMetadata:
      type: object
      required: [sha256, byteSize, mimeType, kind, createdBy, createdAt, path, name]
      properties:
        sha256: { type: string }
        byteSize: { type: integer, minimum: 0 }
        mimeType: { type: string }
        kind: { type: string }
        createdBy: { type: string }
        createdAt: { type: string, format: date-time }
        path: { type: string }
        name: { type: string }

    RunArtifactsView:
      type: object
      required: [runId, mode, artifacts]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        orchestratorRunId: { type: string }
        artifacts:
          type: array
          items: { $ref: "#/components/schemas/RunArtifactMetadata" }
        summary:
          type: object
          additionalProperties: true
        missingArtifacts:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        note: { type: string }

    RunEventsView:
      type: object
      required: [runId, programId, mode, events]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        events:
          type: array
          items:
            type: object
            properties:
              type: { type: string }
              status: { type: string }
              message: { type: string }
              createdAt: { type: string }

    RunProgressStep:
      type: object
      required: [stepId, name, capabilityId, service, actor, status]
      properties:
        stepId: { type: integer, minimum: 0 }
        name: { type: string }
        capabilityId: { type: string }
        service: { type: string }
        actor: { type: string }
        status: { type: string, enum: [pending, running, ok, failed, skipped] }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        diagnostic: { type: string }
        inputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        outputRef:
          oneOf:
            - $ref: "#/components/schemas/OutputRef"
            - type: 'null'
        latencyMs: { type: integer, minimum: 0 }

    RunProgressView:
      type: object
      required:
        - runId
        - programId
        - mode
        - productMode
        - status
        - currentStep
        - failedStep
        - completedSteps
        - stepCount
        - steps
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        status: { type: string, enum: [complete, incomplete] }
        runStatus: { type: string, enum: [starting, updating, completed, failed] }
        currentStep:
          oneOf:
            - type: string
            - type: 'null'
        failedStep:
          oneOf:
            - type: string
            - type: 'null'
        completedSteps:
          type: array
          items: { type: string }
        stepCount: { type: integer, minimum: 0 }
        steps:
          type: array
          items: { $ref: "#/components/schemas/RunProgressStep" }
        missingArtifacts:
          type: array
          items: { type: string }
        orchestratorRunId: { type: string }
        progressRef:
          oneOf:
            - $ref: "#/components/schemas/RunArtifactMetadata"
            - type: 'null'
        updatedAt:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
        note: { type: string }

    RunLearningView:
      type: object
      required: [runId, programId, mode, productMode, source, status, endpoint]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        source: { type: string }
        status: { type: string, enum: [complete, incomplete] }
        endpoint: { type: string }
        summary:
          oneOf:
            - type: object
              additionalProperties: true
            - type: 'null'
        missingArtifacts:
          type: array
          items: { type: string }
        note: { type: string }

    JavaRegionClassification:
      type: object
      required: [schemaVersion, lineRange, originClass, verificationOutcome, mappingClass]
      properties:
        schemaVersion: { type: string, enum: ["v0"] }
        lineRange:
          type: object
          required: [startLine, endLine]
          properties:
            startLine: { type: integer, minimum: 1 }
            endLine: { type: integer, minimum: 1 }
        originClass:
          type: string
          enum: [deterministic, agent_proposed, repair_attempted, manual_modified, manual_edit]
        verificationOutcome:
          type: string
          enum: [oracle_passed, oracle_failed, no_oracle]
        mappingClass:
          type: string
          enum: [direct, aggregated, synthesized, agent_originated]
    JavaRegionClassificationMap:
      type: object
      description: >
        Per-file trust-pillar classification map keyed by generated
        Java file path. This is the shape returned in
        RunSummary.javaRegionClassification and
        TraceabilityEnvelope.javaRegionClassification.
      additionalProperties:
        type: array
        items: { $ref: "#/components/schemas/JavaRegionClassification" }
    IrSymbolAnchor:
      type: object
      required: [cobolFile, cobolLine]
      properties:
        cobolFile: { type: string }
        cobolLine: { type: integer, minimum: 0 }
    TraceabilityEnvelope:
      type: object
      required: [schemaVersion, runId, programId, irSymbolMap]
      properties:
        schemaVersion: { type: string, enum: ["v0"] }
        runId: { type: string }
        programId: { type: string }
        trace:
          oneOf:
            - { type: object, additionalProperties: true }
            - { type: "null" }
        irSymbolMap:
          type: object
          additionalProperties: { $ref: "#/components/schemas/IrSymbolAnchor" }
        javaRegionClassification:
          oneOf:
            - $ref: "#/components/schemas/JavaRegionClassificationMap"
            - { type: "null" }
        note: { type: string }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

    RunExperienceView:
      type: object
      required: [runId, programId, mode]
      properties:
        runId: { type: string }
        programId: { type: string }
        mode: { type: string, enum: [live, 'diagnostic-fixture'] }
        productMode: { type: string, enum: [live, unavailable] }
        summary: { type: string }
        observationPolicy: { type: string }
        learningSignals:
          type: array
          items:
            type: object
            required: [key, label, status, count]
            properties:
              key: { type: string }
              label: { type: string }
              status: { type: string, enum: [observed, absent] }
              summary: { type: string }
              count: { type: integer, minimum: 0 }
              evidenceRefs:
                type: array
                items: { type: string }
        detectedPatterns:
          type: array
          items: { type: string }
        artifactRefs:
          type: array
          items: { type: string }

    ModelGatewayHealth:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, unavailable] }
        providerMode: { type: string }
        activeModelCount: { type: integer }
        dataPolicy: { type: string }
        ledgerEnabled: { type: boolean }
        eventEmission: { type: boolean }

    ModelGatewayModels:
      type: object
      required: [models]
      properties:
        models:
          type: array
          items:
            type: object
            required: [id, name, provider]
            properties:
              id: { type: string }
              name: { type: string }
              provider: { type: string }

    HarnessReady:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, unavailable] }
        summary: { type: string }
