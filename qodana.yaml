#-------------------------------------------------------------------------------#
#               Qodana analysis configuration                                   #
#               https://www.jetbrains.com/help/qodana/qodana-yaml.html          #
#-------------------------------------------------------------------------------#
version: "1.0"

profile:
  name: qodana.starter

projectJDK: "25"

# Default linter (CI pipeline drives polyglot scanning by overriding --linter
# per job in .github/workflows/qodana_code_quality.yml).
linter: jetbrains/qodana-jvm:2026.1

# Project-wide false-positive suppressions. Each entry documents WHY the
# inspection is excluded so future maintainers can re-evaluate the trade-off.
exclude:
  # @dataclass generates __init__ automatically; the inspector does not
  # recognise the synthesised method and flags every dataclass class.
  - name: PyClassHasNoInitInspection

  # Custom internal control-plane headers (X-Harness-Actor, X-Harness-Role)
  # are project convention; the inspector only validates RFC-registered
  # header names.
  - name: UastIncorrectHttpHeaderInspection

  # Test code intentionally ignores res.Body.Close() / w.Write() errors in
  # defer chains. Production code paths still fail the inspection.
  - name: GoUnhandledErrorResult
    paths:
      - "**/*_test.go"

  # Qodana's qodana-jvm linter does not honour //noinspection comments for
  # this rule. The single remaining ScheduledExecutorService allocation in
  # GeneratedProgramRunner uses shutdownNow() in finally on purpose, so
  # try-with-resources (which calls graceful close()) would change timeout
  # semantics. Scope the exclusion narrowly.
  - name: AutoCloseableResource
    paths:
      - "services/build-test-runner-service/src/main/java/com/c2c/w0/buildtest/GeneratedProgramRunner.java"
