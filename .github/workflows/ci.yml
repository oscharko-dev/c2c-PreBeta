name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  ci:
    name: ci
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce PR source policy for main
        if: github.event_name == 'pull_request'
        run: |
          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "dev" ]]; then
            echo "Rejecting PR to main. main accepts only PRs from dev."
            exit 1
          fi

      - name: Check for merge-conflict markers
        run: |
          if git grep -n -I -E '^(<<<<<<< |=======|>>>>>>>)' -- . ':!.git'; then
            echo "Merge-conflict markers were found in tracked files."
            exit 1
          fi

      - name: Validate shell scripts
        run: |
          sh_files=$(git ls-files | grep -E '\\.(sh|bash)$' || true)
          if [ -n "$sh_files" ]; then
            while IFS= read -r file; do
              bash -n "$file"
            done <<< "$sh_files"
          else
            echo "No shell scripts to validate"
          fi

      - name: Validate Python syntax
        run: |
          if [ -n "$(find . -name '*.py' -print -quit)" ]; then
            python3 -m compileall -q .
          else
            echo "No Python files to validate"
          fi

      - name: Set up JDK 21
        if: hashFiles('libs/c2c-target-java-runtime/pom.xml') != ''
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Go
        if: hashFiles('services/agentic-harness-core/go.mod') != '' || hashFiles('services/evidence-service/go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'

      - name: Run evidence-service Go tests
        if: hashFiles('services/evidence-service/go.mod') != ''
        working-directory: services/evidence-service
        run: go test ./...

      - name: Run orchestrator-service Python tests
        if: hashFiles('services/orchestrator-service/pyproject.toml') != ''
        working-directory: services/orchestrator-service
        env:
          PYTHONPATH: src
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet pytest
          .venv/bin/python -m pytest tests/ -q --no-header

      - name: Set up Node.js
        if: hashFiles('apps/c2c-studio/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            apps/c2c-studio/package-lock.json
            apps/c2c-ui/package-lock.json
            services/c2c-bff/package-lock.json

      - name: Install GnuCOBOL for true Golden Master verification
        if: hashFiles('services/build-test-runner-service/pom.xml') != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol3
          cobc --version
          cobcrun --version

      - name: Build c2c-target-java-runtime independently
        if: hashFiles('libs/c2c-target-java-runtime/pom.xml') != ''
        working-directory: libs/c2c-target-java-runtime
        run: mvn -B -ntp verify

      - name: Install c2c-target-java-runtime to local repo
        if: hashFiles('services/target-java-generation-service/pom.xml') != ''
        working-directory: libs/c2c-target-java-runtime
        run: mvn -B -ntp -DskipTests install

      - name: Build target-java-generation-service
        if: hashFiles('services/target-java-generation-service/pom.xml') != ''
        working-directory: services/target-java-generation-service
        run: mvn -B -ntp verify

      - name: Install target-java-generation-service to local repo
        if: hashFiles('services/build-test-runner-service/pom.xml') != ''
        working-directory: services/target-java-generation-service
        run: mvn -B -ntp -DskipTests install

      - name: Build build-test-runner-service (W0 smoke verification path)
        if: hashFiles('services/build-test-runner-service/pom.xml') != ''
        working-directory: services/build-test-runner-service
        run: mvn -B -ntp verify

      - name: Install c2c-studio dependencies
        if: hashFiles('apps/c2c-studio/package.json') != ''
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Run c2c-studio lint
        if: hashFiles('apps/c2c-studio/package.json') != ''
        working-directory: apps/c2c-studio
        run: npm run lint

      - name: Run c2c-studio unit and contract tests
        if: hashFiles('apps/c2c-studio/package.json') != ''
        working-directory: apps/c2c-studio
        run: npm test

      - name: Build c2c-studio
        if: hashFiles('apps/c2c-studio/package.json') != ''
        working-directory: apps/c2c-studio
        run: npm run build

      - name: Install Playwright Chromium
        if: hashFiles('apps/c2c-studio/package.json') != ''
        working-directory: apps/c2c-studio
        run: npx playwright install --with-deps chromium

      - name: Run c2c-studio browser acceptance suite
        if: hashFiles('apps/c2c-studio/package.json') != ''
        working-directory: apps/c2c-studio
        run: npm run test:e2e:ci

      - name: Run W0.3 release gate (deterministic-first, no Foundry)
        if: hashFiles('scripts/w0-3-release-gate.sh') != ''
        env:
          # No C2C_LOCAL_ENV_FILE: in CI we want the launcher to fall back
          # to its absolute-path defaults rather than source .env.example,
          # which declares C2C_LOCAL_VAR_DIR as a relative path (a latent
          # launcher quirk: the Go binary build cd's into the service dir
          # while keeping the -o path relative, which puts the binary in
          # the wrong place).
          C2C_LOCAL_MODEL_GATEWAY_ENABLED: 'false'
        run: ./scripts/w0-3-release-gate.sh
