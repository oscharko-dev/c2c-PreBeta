name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hygiene:
    name: Hygiene, syntax, and secret diff
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce PR source policy for main
        if: github.event_name == 'pull_request'
        run: |
          if [[ "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "dev" ]]; then
            echo "Rejecting PR to main. main accepts only PRs from dev."
            exit 1
          fi

      - name: Check for merge-conflict markers
        run: |
          if git grep -n -I -E '^(<<<<<<< |=======|>>>>>>>)' -- . ':!.git'; then
            echo "Merge-conflict markers were found in tracked files."
            exit 1
          fi

      - name: Validate shell scripts
        run: |
          sh_files=$(git ls-files | grep -E '\.(sh|bash)$' || true)
          if [ -n "$sh_files" ]; then
            while IFS= read -r file; do
              bash -n "$file"
            done <<< "$sh_files"
          else
            echo "No shell scripts to validate"
          fi

      - name: Validate Python syntax
        run: |
          if [ -n "$(find . -name '*.py' -not -path './.git/*' -not -path './.venv/*' -print -quit)" ]; then
            python3 -m compileall -q .
          else
            echo "No Python files to validate"
          fi

      - name: Scan changed files for secrets
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || github.event.before }}
          HEAD_REF: ${{ github.sha }}
        run: |
          base_ref="$BASE_REF"
          if [[ -z "$base_ref" || "$base_ref" =~ ^0+$ ]]; then
            base_ref="${HEAD_REF}~1"
          fi
          echo "Scanning changes from: ${base_ref}..${HEAD_REF}"
          python3 scripts/scan-secrets.py --base "$base_ref" --head "$HEAD_REF"

  platform:
    name: Repository platform validation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run platform validation
        run: ./scripts/validate-platform.sh

  go:
    name: Go checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'

      - name: Run Go checks
        run: ./scripts/go-check.sh

  python:
    name: Python checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Python checks
        run: ./scripts/python-check.sh

  java:
    name: Java checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install GnuCOBOL for true Golden Master verification
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol3
          cobc --version
          cobcrun --version

      - name: Run Java checks
        run: ./scripts/java-check.sh

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            apps/c2c-studio/package-lock.json
            services/c2c-bff/package-lock.json
            services/typescript/w0-service/package-lock.json

      - name: Run TypeScript checks
        run: ./scripts/typescript-check.sh

      - name: Verify Monaco is lazy-loaded
        working-directory: apps/c2c-studio
        run: npm run verify:monaco-lazy

  ci:
    name: ci
    runs-on: ubuntu-24.04
    needs:
      - hygiene
      - platform
      - go
      - python
      - java
      - typescript
    if: ${{ always() }}
    steps:
      - name: Summarize required gate results
        run: |
          echo "hygiene:    ${{ needs.hygiene.result }}"
          echo "platform:   ${{ needs.platform.result }}"
          echo "go:         ${{ needs.go.result }}"
          echo "python:     ${{ needs.python.result }}"
          echo "java:       ${{ needs.java.result }}"
          echo "typescript: ${{ needs.typescript.result }}"
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "At least one required quality gate failed or was cancelled."
            exit 1
          fi
          echo "All required quality gates passed."
