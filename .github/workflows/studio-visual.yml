name: Studio visual regression

# Studio-IDE-12 (#250) §Visual Regression AC:
#   "Visual regression snapshots in place for structural elements".
#
# Companion to ``studio-a11y.yml``. Runs the dedicated ``@visual``
# spec against a production Studio build and asserts that the
# committed baseline images still match the rendered structural
# elements (top bar, activity bar, status bar, clear-drafts dialog frame).
#
# Baseline strategy: baselines are committed per (browser, platform) under
# ``apps/c2c-studio/tests/e2e/visual.spec.ts-snapshots``. The committed
# baselines are Chromium/macOS images, so CI runs on macOS and compares those
# files directly. Snapshot updates are made intentionally with
# ``npm run test:e2e:update-snapshots`` and reviewed in the PR that changes UI.

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/c2c-studio/**'
      - '.github/workflows/studio-visual.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'apps/c2c-studio/**'
      - '.github/workflows/studio-visual.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Studio visual regression
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/c2c-studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('apps/c2c-studio/package-lock.json') }}

      - name: Install Playwright Chromium
        working-directory: apps/c2c-studio
        run: npx playwright install chromium

      - name: Build Studio (production)
        working-directory: apps/c2c-studio
        env:
          NEXT_PUBLIC_C2C_BFF_BASE_URL: ""
        run: npm run build

      - name: Run visual regression gate
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        run: npx playwright test --config=playwright.visual.config.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: apps/c2c-studio/playwright-report/
          retention-days: 7
