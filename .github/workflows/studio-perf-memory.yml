name: Studio perf + memory

# Studio-IDE-12 (#250) §Performance + §Memory ACs.
#
# After PR #291 passed @perf + @memory on the first CI run, the
# advisory step is flipped to required: both harnesses now block the
# PR on regression. The reference-hardware SLA from the issue spec
# already ships with a 5× cushion on the perf side (the
# ``expect(elapsed).toBeLessThan(MOUNT_SLA_*_MS * 5)`` assertions in
# ``perf.spec.ts``), so transient CI hardware variance does not flip
# the gate. The memory harness gracefully skips when
# ``performance.measureUserAgentSpecificMemory()`` is unavailable
# (no COOP/COEP on the static hosting), so the assertion only fires
# when the API is present AND heap growth exceeds 10%.
#
# Perf SLAs (per Issue #250):
#   * 5k-line mount: ≤ 800 ms
#   * 10k-line mount: ≤ 1500 ms
#   * Search to first match (5k buffer): ≤ 200 ms
#   The Playwright harness uses a 5× cushion against the reference
#   SLAs so transient CI hardware variance does not cause noise; the
#   actual numbers are emitted to stdout for tracking.
#
# Memory SLA (per Issue #250):
#   * ≤ 10% JS heap growth after 50 run-switch cycles.
#   The harness skips gracefully when
#   ``performance.measureUserAgentSpecificMemory()`` is unavailable
#   in the CI Chromium (COOP/COEP not enabled on the static hosting).

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  perf:
    name: Studio performance harness
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/c2c-studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('apps/c2c-studio/package-lock.json') }}

      - name: Install Playwright Chromium with system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (browser cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install-deps chromium

      - name: Build Studio (production)
        working-directory: apps/c2c-studio
        env:
          NEXT_PUBLIC_C2C_BFF_BASE_URL: ""
        run: npm run build

      - name: Run @perf harness
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        # The 5× SLA cushion in ``perf.spec.ts`` absorbs CI
        # hardware variance; an actual regression past the cushion
        # (e.g. a Monaco mount past 4000 ms on a 5k-line buffer) is
        # a real signal worth blocking on.
        run: npx playwright test --config=playwright.studio-only.config.ts --grep @perf --reporter=line

  memory:
    name: Studio memory harness
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/c2c-studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('apps/c2c-studio/package-lock.json') }}

      - name: Install Playwright Chromium with system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (browser cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install-deps chromium

      - name: Build Studio (production)
        working-directory: apps/c2c-studio
        env:
          NEXT_PUBLIC_C2C_BFF_BASE_URL: ""
        run: npm run build

      - name: Run @memory harness
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        # The memory harness gracefully skips when
        # ``performance.measureUserAgentSpecificMemory()`` is
        # unavailable in CI Chromium (no COOP/COEP on the static
        # hosting); the assertion only fires when the API is
        # present AND heap growth exceeds 10% — a real regression.
        run: npx playwright test --config=playwright.studio-only.config.ts --grep @memory --reporter=line
