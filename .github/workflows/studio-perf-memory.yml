name: Studio perf + memory

# Studio-IDE-12 (#250) §Performance + §Memory ACs.
#
# The perf and memory jobs build the explicit harness variant so the
# workbench exposes the browser-only test bridge. Normal production and
# dev builds do not set ``NEXT_PUBLIC_C2C_PERF_HARNESS`` and never ship
# the bridge globals.
#
# Perf SLAs (per Issue #250):
#   * 5k-line mount: ≤ 800 ms
#   * 10k-line mount: ≤ 1500 ms
#   * Search to first match (5k buffer): ≤ 200 ms
#   The Playwright harness uses a 2× cushion against the reference
#   SLAs so transient CI hardware variance does not cause noise; the
#   actual numbers are emitted to stdout for tracking.
#
# Memory SLA (per Issue #250):
#   * ≤ 10% JS heap growth after 50 run-switch cycles using Chromium heap
#     sampling after forced GC.
#   * Monaco model count returns to baseline after 50 file switches.

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/c2c-studio/**'
      - '.github/workflows/studio-perf-memory.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'apps/c2c-studio/**'
      - '.github/workflows/studio-perf-memory.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  perf:
    name: Studio performance harness
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/c2c-studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('apps/c2c-studio/package-lock.json') }}

      - name: Install Playwright Chromium with system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (browser cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install-deps chromium

      - name: Build Studio (production with perf harness bridge)
        working-directory: apps/c2c-studio
        env:
          NEXT_PUBLIC_C2C_BFF_BASE_URL: ""
          # Studio-IDE-12 (#250): enables the ``PerfHarnessBridge``
          # window-event listener + ``__c2cMonacoEditor`` global so
          # the harness can drive the COBOL editor without Studio
          # internals. Production / dev builds never set this so
          # end users never carry the bridge.
          NEXT_PUBLIC_C2C_PERF_HARNESS: "1"
        run: npm run build

      - name: Run @perf harness
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        # The harness measures editor mount + cold-start latency.
        # The 2× SLA cushion (``MOUNT_SLA_*_MS * 2``) absorbs CI
        # hardware variance; a regression past the cushion is a
        # real signal worth blocking on.
        run: npx playwright test --config=playwright.studio-only.config.ts --grep @perf --reporter=line

  memory:
    name: Studio memory harness
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/c2c-studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('apps/c2c-studio/package-lock.json') }}

      - name: Install Playwright Chromium with system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (browser cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install-deps chromium

      - name: Build Studio (production with perf harness bridge)
        working-directory: apps/c2c-studio
        env:
          NEXT_PUBLIC_C2C_BFF_BASE_URL: ""
          NEXT_PUBLIC_C2C_PERF_HARNESS: "1"
        run: npm run build

      - name: Run @memory harness
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        # The memory harness drives real load/clear cycles through
        # the same bridge as @perf and always enforces Monaco model
        # count disposal. Heap growth is sampled from Chromium after
        # forced GC so pending collection does not hide retained objects.
        run: npx playwright test --config=playwright.studio-only.config.ts --grep @memory --reporter=line
