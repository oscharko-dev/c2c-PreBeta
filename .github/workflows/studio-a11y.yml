name: Studio browser quality gate

# Studio-IDE-12 (#250) browser-side gates:
#   * Accessibility: axe-core on the Studio shell has zero serious or
#     critical violations.
#   * CSP: Studio hydrates and Monaco mounts under the production CSP,
#     and sanitizer payloads do not execute.
#
# The two browser gates share one production Studio build. They run only
# for Studio/BFF/browser-gate changes; the required `ci` workflow covers
# general TypeScript build, lint, unit, and BFF tests on every PR.

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/c2c-studio/**'
      - 'services/c2c-bff/**'
      - '.github/workflows/studio-a11y.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'apps/c2c-studio/**'
      - 'services/c2c-bff/**'
      - '.github/workflows/studio-a11y.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  browser-quality:
    name: Studio browser quality (a11y + CSP)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/c2c-studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('apps/c2c-studio/package-lock.json') }}

      - name: Install Playwright Chromium with system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install --with-deps chromium

      # When the browser cache hits we still need the system deps
      # (libnss3, libatk1.0, etc.) to be installed on the runner.
      - name: Install Playwright system deps (browser cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install-deps chromium

      - name: Build Studio (production)
        working-directory: apps/c2c-studio
        env:
          # The a11y harness only needs the workbench shell — no BFF
          # override is configured so the production bundle uses the
          # same-origin default ``connect-src 'self'`` policy.
          NEXT_PUBLIC_C2C_BFF_BASE_URL: ""
        run: npm run build

      - name: Run axe-core gate (@a11y spec only)
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        run: npm run test:e2e:a11y:ci

      - name: Run CSP gate (@csp spec only)
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        run: npm run test:e2e:csp:ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-browser-quality
          path: apps/c2c-studio/playwright-report/
          retention-days: 7
