name: Studio a11y gate

# Studio-IDE-12 (#250) §Accessibility AC:
#   "axe-core run on the Studio shell after a successful run returns
#    zero serious or critical violations."
#
# This workflow is the CI side of that gate. It runs only the @a11y
# Playwright spec against a production Studio build (no BFF, no
# upstream services) so the WCAG 2.2 AA assertion is enforced on every
# PR without paying the 10-service local-stack startup cost.
#
# The harness exercises the empty workbench shell at ``/`` — that
# surface includes every workbench region the issue lists (top bar,
# activity bar, secondary stripe, status bar, etc.) and renders
# without a connected backend.
#
# Companion specs (``@perf`` / ``@memory`` / ``@visual``) stay
# non-blocking initially per the issue spec; flipping them to required
# is a separate workflow once their CI infrastructure (browser
# caching, fixture warm-up, snapshot determinism) is proven stable.

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  a11y:
    name: Studio a11y (WCAG 2.2 AA)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/c2c-studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/c2c-studio
        run: npm ci --no-fund --no-audit

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('apps/c2c-studio/package-lock.json') }}

      - name: Install Playwright Chromium with system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install --with-deps chromium

      # When the browser cache hits we still need the system deps
      # (libnss3, libatk1.0, etc.) to be installed on the runner.
      - name: Install Playwright system deps (browser cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: apps/c2c-studio
        run: npx playwright install-deps chromium

      - name: Build Studio (production)
        working-directory: apps/c2c-studio
        env:
          # The a11y harness only needs the workbench shell — no BFF
          # override is configured so the production bundle uses the
          # same-origin default ``connect-src 'self'`` policy.
          NEXT_PUBLIC_C2C_BFF_BASE_URL: ""
        run: npm run build

      - name: Run axe-core gate (@a11y spec only)
        working-directory: apps/c2c-studio
        env:
          CI: "1"
        run: npm run test:e2e:a11y:ci

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-a11y
          path: apps/c2c-studio/playwright-report/
          retention-days: 7
