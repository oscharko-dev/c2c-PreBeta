name: platform-baseline

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  bootstrap:
    name: Repository bootstrap and platform validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run platform validation
        run: ./scripts/validate-platform.sh

  go-w0:
    name: Go W0 service checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/go/w0-service/go.mod

      - name: Run Go checks
        run: ./scripts/go-check.sh

  python-w0:
    name: Python W0 service checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python checks
        run: ./scripts/python-check.sh

  typescript-w0:
    name: TypeScript W0 service checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run TypeScript checks
        run: ./scripts/typescript-check.sh

  java-w0:
    name: Java W0 service checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install GnuCOBOL for true Golden Master verification
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol3
          cobc --version
          cobcrun --version

      - name: Run Java checks
        run: ./scripts/java-check.sh
