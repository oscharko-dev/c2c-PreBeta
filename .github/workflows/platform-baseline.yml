name: platform-baseline

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read
  actions: read

jobs:
  bootstrap:
    name: Repository bootstrap and platform validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run platform validation
        run: ./scripts/validate-platform.sh

      - name: Upload platform validation logs
        if: always()
        run: |
          mkdir -p artifacts
          ./scripts/license-sbom.sh
        
  go-w0:
    name: Go W0 service checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/go/w0-service/go.mod

      - name: Run Go checks
        run: ./scripts/go-check.sh

  python-w0:
    name: Python W0 service checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python checks
        run: ./scripts/python-check.sh

  typescript-w0:
    name: TypeScript W0 service checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run TypeScript checks
        run: ./scripts/typescript-check.sh

  java-w0:
    name: Java W0 service checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install GnuCOBOL for true Golden Master verification
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol3
          cobc --version
          cobcrun --version

      - name: Run Java checks
        run: ./scripts/java-check.sh

  security-baseline:
    name: Secret, dependency, license, and SBOM baseline
    runs-on: ubuntu-latest
    needs:
      - bootstrap
      - go-w0
      - python-w0
      - typescript-w0
      - java-w0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run secret scan
        run: ./scripts/secret-scan.sh

      - name: Generate platform security and supply-chain artifacts
        run: |
          ./scripts/license-sbom.sh
          mkdir -p artifacts
          cp artifacts/platform-sbom.json artifacts/platform-sbom-${{ github.sha }}.json
          cp artifacts/dependency-manifest.json artifacts/dependency-manifest-${{ github.sha }}.json
          cp artifacts/license-visibility.json artifacts/license-visibility-${{ github.sha }}.json

      - name: Upload baseline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platform-baseline-${{ github.sha }}
          path: |
            artifacts/platform-sbom-${{ github.sha }}.json
            artifacts/dependency-manifest-${{ github.sha }}.json
            artifacts/license-visibility-${{ github.sha }}.json
          if-no-files-found: error
