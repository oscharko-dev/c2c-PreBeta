name: Secret scan

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository secret scan
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || format('{0}~1', github.sha) }}
        run: |
          echo "Scanning changes from: ${BASE_REF}..${{ github.sha }}"
          python3 scripts/scan-secrets.py --base "${BASE_REF}" --head "${{ github.sha }}"
