url = "https://developers.openai.com/mcp"

[mcp_servers.playwright]
args = [
    "-y",
    "@playwright/mcp",
]
command = "npx"
cwd = "/Users/oscharko-dev/Projects/c2c-PreBeta"
enabled = true
startup_timeout_sec = 30
tool_timeout_sec = 90

[mcp_servers.sentry]
enabled = false
required = false
startup_timeout_sec = 20
tool_timeout_sec = 45
url = "https://mcp.sentry.dev"

